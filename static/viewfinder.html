<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CineAnchor Viewfinder</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: -apple-system, BlinkMacSystemFont, sans-serif; overflow: hidden; background: #111; }

  #canvas { display: block; }

  #panel {
    position: fixed; top: 16px; right: 16px; width: 280px;
    background: rgba(20,20,30,0.92); border: 1px solid rgba(255,255,255,0.1);
    border-radius: 12px; padding: 20px; color: #ccc; backdrop-filter: blur(12px);
    z-index: 10; font-size: 13px;
  }
  #panel h2 { font-size: 16px; font-weight: 600; color: #fff; margin-bottom: 14px; }
  #panel label { display: block; font-size: 11px; color: #888; margin-bottom: 3px; margin-top: 10px; }
  #panel select, #panel input, #panel textarea {
    width: 100%; padding: 7px 10px; border-radius: 6px; border: 1px solid rgba(255,255,255,0.12);
    background: rgba(255,255,255,0.06); color: #ddd; font-size: 12px; outline: none;
  }
  #panel textarea { resize: vertical; min-height: 40px; }
  #panel button {
    width: 100%; padding: 9px; border-radius: 6px; border: none;
    font-size: 13px; font-weight: 600; cursor: pointer; margin-top: 10px;
    transition: opacity 0.15s;
  }
  #panel button:active { opacity: 0.7; }
  .btn-record { background: #4f46e5; color: #fff; }
  .btn-render { background: #16a34a; color: #fff; }
  .btn-clear { background: rgba(255,255,255,0.08); color: #aaa; }
  .btn-record.recording { background: #dc2626; animation: pulse 0.8s infinite; }
  @keyframes pulse { 50% { opacity: 0.6; } }

  #status { font-size: 11px; color: #888; margin-top: 12px; line-height: 1.5; }
  #status .ok { color: #4ade80; }
  #status .err { color: #f87171; }
  #frame-count { font-size: 28px; font-weight: 700; color: #fff; text-align: center; margin: 8px 0; }

  #pose-hud {
    position: fixed; bottom: 16px; left: 16px;
    background: rgba(20,20,30,0.85); border-radius: 8px;
    padding: 10px 14px; color: #888; font-size: 11px;
    font-family: 'SF Mono', 'Fira Code', monospace; z-index: 10;
  }

  #instructions {
    position: fixed; bottom: 16px; right: 16px;
    color: #555; font-size: 11px; text-align: right; z-index: 10;
    line-height: 1.6;
  }

  .btn-mode {
    display: inline-block; width: 32%; padding: 6px 0; border-radius: 5px; border: 1px solid rgba(255,255,255,0.15);
    background: rgba(255,255,255,0.04); color: #888; font-size: 11px; cursor: pointer; text-align: center;
    transition: all 0.15s;
  }
  .btn-mode.active { background: #4f46e5; color: #fff; border-color: #4f46e5; }
  .btn-mode:hover:not(.active) { background: rgba(255,255,255,0.08); color: #ccc; }

  #gamepad-status { font-size: 11px; margin-top: 4px; }
  #gamepad-status .connected { color: #4ade80; }
  #gamepad-status .disconnected { color: #666; }
</style>
</head>
<body>

<div id="panel">
  <h2>CineAnchor Viewfinder</h2>

  <label>场景</label>
  <select id="scene-select">
    <option value="test_scene">Test Cube</option>
    <option value="office_scene">Office</option>
    <option value="forest_path">Forest Path</option>
  </select>

  <label>Prompt</label>
  <textarea id="prompt" placeholder="描述你想要的画面风格...">a colorful cube floating in dark space, studio lighting, high quality</textarea>

  <label>FPS</label>
  <input id="fps" type="number" value="8" min="1" max="60">

  <label>帧插值</label>
  <select id="interpolation">
    <option value="1">1x (不插值)</option>
    <option value="2">2x</option>
    <option value="3" selected>3x (推荐)</option>
    <option value="4">4x</option>
  </select>

  <label>相机模式</label>
  <div style="display:flex;gap:4px">
    <button class="btn-mode active" id="btn-orbit" onclick="setMode('orbit')">Orbit</button>
    <button class="btn-mode" id="btn-drone" onclick="setMode('drone')">Drone</button>
    <button class="btn-mode" id="btn-fps" onclick="setMode('fps')">FPS</button>
  </div>

  <div id="frame-count">0</div>
  <div style="text-align:center;color:#666;font-size:11px;margin-top:-4px">已录制帧</div>

  <button class="btn-record" id="btn-record" onclick="toggleRecord()">录制帧</button>
  <button class="btn-render" id="btn-render" onclick="renderVideo()">生成视频</button>
  <button class="btn-clear" onclick="clearFrames()">清空帧</button>

  <div id="status">
    <span id="api-status">API: 检测中...</span>
  </div>
</div>

<div id="pose-hud">
  <div style="color:#fff;font-weight:600;margin-bottom:2px">
    <span id="hud-mode">Orbit</span>
    <span id="gamepad-status" style="float:right"><span class="disconnected">no pad</span></span>
  </div>
  pos: <span id="hud-pos">--</span><br>
  rot: <span id="hud-quat">--</span>
</div>

<div id="instructions">
  <span id="instr-orbit">拖拽旋转 | 滚轮缩放 | 右键平移<br>Space/R 录制</span>
  <span id="instr-fly" style="display:none">WASD 移动 | Q/E 升降 | 方向键 看<br>RT 加速 | Space/R 录制</span>
</div>

<canvas id="canvas"></canvas>

<script type="importmap">
{
  "imports": {
    "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
    "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
  }
}
</script>

<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

// ---- Scene Setup ----
const canvas = document.getElementById('canvas');
const renderer = new THREE.WebGLRenderer({ canvas, antialias: true });
renderer.setPixelRatio(window.devicePixelRatio);
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.shadowMap.enabled = true;
renderer.toneMapping = THREE.ACESFilmicToneMapping;

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x1a1a2e);

const camera = new THREE.PerspectiveCamera(50, window.innerWidth / window.innerHeight, 0.1, 100);
camera.position.set(0, 0.5, 8);
camera.lookAt(0, 0, 0);

// Orbit Controls
const controls = new OrbitControls(camera, renderer.domElement);
controls.target.set(0, 0, 0);
controls.enableDamping = true;
controls.dampingFactor = 0.08;
controls.minDistance = 1.5;
controls.maxDistance = 20;
controls.update();

// Grid
scene.add(new THREE.GridHelper(10, 20, 0x333355, 0x222244));

// Axes
const axes = new THREE.AxesHelper(3);
scene.add(axes);

// Scene proxy cube (matches 3DGS test_scene: 2x2x2 at origin)
const cubeGeo = new THREE.BoxGeometry(2, 2, 2);
const cubeMat = new THREE.MeshStandardMaterial({
  color: 0x6366f1, roughness: 0.3, metalness: 0.1, wireframe: false,
  transparent: true, opacity: 0.5
});
const cube = new THREE.Mesh(cubeGeo, cubeMat);
scene.add(cube);

// Wireframe overlay for better depth perception
const wire = new THREE.Mesh(
  new THREE.BoxGeometry(2, 2, 2),
  new THREE.MeshBasicMaterial({ color: 0x818cf8, wireframe: true, transparent: true, opacity: 0.3 })
);
scene.add(wire);

// Lighting
scene.add(new THREE.AmbientLight(0x404060, 2));
const key = new THREE.DirectionalLight(0xffffff, 3);
key.position.set(5, 8, 3);
scene.add(key);
const fill = new THREE.DirectionalLight(0x8888ff, 1);
fill.position.set(-3, 1, -2);
scene.add(fill);

// Camera frustum helper (shows where the 3DGS camera is looking)
const frustumHelper = new THREE.CameraHelper(
  new THREE.PerspectiveCamera(50, 512 / 288, 0.1, 10)
);
scene.add(frustumHelper);

// ---- API Client ----
const API = window.location.origin;
let apiOk = false;
let frameId = 0;

async function checkAPI() {
  try {
    const r = await fetch(`${API}/health`);
    const d = await r.json();
    apiOk = d.status === 'ok';
    document.getElementById('api-status').innerHTML =
      `API: <span class="ok">${d.render_mode}</span> (${d.platform})`;
  } catch {
    document.getElementById('api-status').innerHTML =
      'API: <span class="err">离线</span>';
  }
}
checkAPI();
setInterval(checkAPI, 5000);

async function apiCall(method, path, body) {
  const opts = { method, headers: { 'Content-Type': 'application/json' } };
  if (body) opts.body = JSON.stringify(body);
  const r = await fetch(`${API}${path}`, opts);
  if (!r.ok) {
    const e = await r.json().catch(() => ({}));
    throw new Error(e.detail || r.statusText);
  }
  return r.json();
}

// ---- Camera Pose ----
function getPose() {
  return {
    position: { x: camera.position.x, y: camera.position.y, z: camera.position.z },
    rotation: { x: camera.quaternion.x, y: camera.quaternion.y, z: camera.quaternion.z, w: camera.quaternion.w }
  };
}

function updateHUD() {
  const p = camera.position;
  const q = camera.quaternion;
  document.getElementById('hud-pos').textContent =
    `${p.x.toFixed(2)}, ${p.y.toFixed(2)}, ${p.z.toFixed(2)}`;
  document.getElementById('hud-quat').textContent =
    `${q.x.toFixed(3)}, ${q.y.toFixed(3)}, ${q.z.toFixed(3)}, ${q.w.toFixed(3)}`;
}

// Update frustum helper to follow the camera
function updateFrustum() {
  const fc = frustumHelper.camera;
  fc.position.copy(camera.position);
  fc.quaternion.copy(camera.quaternion);
  fc.aspect = camera.aspect;
  fc.updateProjectionMatrix();
  fc.updateMatrixWorld();
  frustumHelper.update();
}

// ---- Recording ----
let recording = false;
let recordInterval = null;
let lastRecordedPose = null;

window.toggleRecord = async function() {
  if (recording) {
    stopRecording();
    return;
  }

  const sceneId = document.getElementById('scene-select').value;
  if (!apiOk) { alert('API 离线，请先启动后端: python main.py'); return; }

  // Initialize scene
  try {
    await apiCall('POST', `/scene/create?scene_id=${sceneId}`);
  } catch (e) {
    alert(`场景初始化失败: ${e.message}`);
    return;
  }

  startRecording();
};

function startRecording() {
  recording = true;
  const btn = document.getElementById('btn-record');
  btn.textContent = '停止录制 (Space)';
  btn.classList.add('recording');

  // Capture one frame immediately
  captureFrame();

  // Then capture every 500ms while camera is moving
  recordInterval = setInterval(() => {
    const pose = getPose();
    // Only capture if camera moved significantly
    if (lastRecordedPose) {
      const dp = Math.sqrt(
        (pose.position.x - lastRecordedPose.position.x) ** 2 +
        (pose.position.y - lastRecordedPose.position.y) ** 2 +
        (pose.position.z - lastRecordedPose.position.z) ** 2
      );
      if (dp < 0.1) return; // skip if barely moved
    }
    captureFrame();
  }, 500);
}

function stopRecording() {
  recording = false;
  const btn = document.getElementById('btn-record');
  btn.textContent = '录制帧';
  btn.classList.remove('recording');
  if (recordInterval) { clearInterval(recordInterval); recordInterval = null; }
}

async function captureFrame() {
  const sceneId = document.getElementById('scene-select').value;
  const pose = getPose();
  lastRecordedPose = pose;

  try {
    await apiCall('POST', '/camera/record_frame', {
      scene_id: sceneId,
      frame_id: frameId,
      camera_pose: pose
    });
    frameId++;
    document.getElementById('frame-count').textContent = frameId;
  } catch (e) {
    console.error('Record frame failed:', e);
  }
}

// Single frame capture
window.captureSingleFrame = captureFrame;

// ---- Render ----
window.renderVideo = async function() {
  if (frameId === 0) { alert('请先录制帧'); return; }
  if (!apiOk) { alert('API 离线'); return; }

  const sceneId = document.getElementById('scene-select').value;
  const prompt = document.getElementById('prompt').value;
  const fps = parseInt(document.getElementById('fps').value) || 8;

  const btn = document.getElementById('btn-render');
  btn.textContent = '渲染中...';
  btn.disabled = true;

  try {
    const interp = parseInt(document.getElementById('interpolation').value) || 1;
    const result = await apiCall('POST', '/render/video', { scene_id: sceneId, prompt, fps, interpolation: interp });
    btn.textContent = '生成视频';
    btn.disabled = false;
    alert(`视频已生成: ${API}${result.video_url}`);
  } catch (e) {
    btn.textContent = '生成视频';
    btn.disabled = false;
    alert(`渲染失败: ${e.message}`);
  }
};

// ---- Camera Mode System ----
let camMode = 'orbit'; // orbit | drone | fps
const DEADZONE = 0.12;
const MOVE_SPEED = 3.0;   // units/sec (位移)
const LOOK_SPEED = 1.2;   // rad/sec  (旋转，比位移更慢以精确构图)
const THRUST_SPEED = 2.0;  // units/sec (升降)
const STICK_POWER = 2.2;   // 响应曲线指数 (>1 = 中心区更精细)

window.setMode = function(mode) {
  camMode = mode;
  document.getElementById('btn-orbit').classList.toggle('active', mode === 'orbit');
  document.getElementById('btn-drone').classList.toggle('active', mode === 'drone');
  document.getElementById('btn-fps').classList.toggle('active', mode === 'fps');
  document.getElementById('hud-mode').textContent = mode.charAt(0).toUpperCase() + mode.slice(1);
  document.getElementById('instr-orbit').style.display = mode === 'orbit' ? '' : 'none';
  document.getElementById('instr-fly').style.display = mode !== 'orbit' ? '' : 'none';
  controls.enabled = mode === 'orbit';
  if (mode !== 'orbit') controls.target.copy(camera.position).add(
    new THREE.Vector3(0, 0, -1).applyQuaternion(camera.quaternion)
  );
};

// ---- Gamepad ----
let gamepadConnected = false;
let lastGamepadButtons = {};

function pollGamepad() {
  const pads = navigator.getGamepads();
  let active = null;
  for (const p of pads) { if (p) { active = p; break; } }
  if (!active) {
    if (gamepadConnected) {
      gamepadConnected = false;
      document.getElementById('gamepad-status').innerHTML = '<span class="disconnected">no pad</span>';
    }
    return null;
  }
  if (!gamepadConnected) {
    gamepadConnected = true;
    document.getElementById('gamepad-status').innerHTML = '<span class="connected">pad ok</span>';
  }
  return active;
}

function stickVal(gp, idx) {
  const raw = gp.axes[idx] || 0;
  const abs = Math.abs(raw);
  if (abs < DEADZONE) return 0;
  // 将 [deadzone, 1] 重映射到 [0, 1] 再做幂次曲线
  const normalized = (abs - DEADZONE) / (1 - DEADZONE);
  const curved = Math.pow(normalized, STICK_POWER);
  return Math.sign(raw) * curved;
}

// 旋转平滑: 指数移动平均消除手柄抖动
const smoothLook = { x: 0, y: 0 };
const SMOOTH = 0.12; // 越小越平滑但延迟越大 (0.12 = 电影级阻尼)

function btnJustPressed(gp, idx) {
  const pressed = gp.buttons[idx] && gp.buttons[idx].pressed;
  const was = lastGamepadButtons[idx] || false;
  lastGamepadButtons[idx] = pressed;
  return pressed && !was;
}

function handleGamepadInput(gp, dt) {
  if (!gp) return;
  const moveSpeed = MOVE_SPEED * dt;
  const lookSpeed = LOOK_SPEED * dt;

  // Shared: Select button to cycle modes
  if (btnJustPressed(gp, 8)) {
    const modes = ['orbit', 'drone', 'fps'];
    const next = modes[(modes.indexOf(camMode) + 1) % 3];
    setMode(next);
  }

  if (camMode === 'drone') {
    // Left stick = yaw+throttle, Right stick = pitch+roll
    const rawYaw = stickVal(gp, 0);
    const rawThrottle = -stickVal(gp, 1);
    const rawPitch = -stickVal(gp, 3);
    const rawRoll = stickVal(gp, 2);

    // 平滑旋转输入 (消除手柄抖动)
    const targetYaw = rawYaw * lookSpeed;
    const targetPitch = rawPitch * lookSpeed;
    const targetRoll = rawRoll * lookSpeed;
    smoothLook.x += (targetYaw - smoothLook.x) * SMOOTH;
    smoothLook.y += (targetPitch - smoothLook.y) * SMOOTH;

    camera.position.y += rawThrottle * THRUST_SPEED * dt;

    if (Math.abs(smoothLook.x) > 0.0001) {
      camera.rotateOnWorldAxis(new THREE.Vector3(0, 1, 0), -smoothLook.x);
    }
    if (Math.abs(smoothLook.y) > 0.0001) {
      camera.rotateX(smoothLook.y);
    }
    if (Math.abs(targetRoll) > 0.0001) {
      camera.rotateZ(-targetRoll);
    }

    // RT = thrust forward
    const rt = gp.buttons[7] ? gp.buttons[7].value : 0;
    if (rt > 0.1) {
      const fwd = new THREE.Vector3(0, 0, -1).applyQuaternion(camera.quaternion);
      camera.position.addScaledVector(fwd, rt * moveSpeed * 2);
    }
  }

  if (camMode === 'fps') {
    // Left stick = move, Right stick = look
    const lx = stickVal(gp, 0);
    const ly = -stickVal(gp, 1);
    const rawRx = stickVal(gp, 2);
    const rawRy = -stickVal(gp, 3);

    // 平滑旋转
    const targetRx = rawRx * lookSpeed;
    const targetRy = rawRy * lookSpeed;
    smoothLook.x += (targetRx - smoothLook.x) * SMOOTH;
    smoothLook.y += (targetRy - smoothLook.y) * SMOOTH;

    if (Math.abs(smoothLook.x) > 0.0001 || Math.abs(smoothLook.y) > 0.0001) {
      camera.rotateY(-smoothLook.x);
      camera.rotateX(smoothLook.y);
    }

    // 移动 (FPS 模式保持水平)
    if (Math.abs(lx) > 0 || Math.abs(ly) > 0) {
      const fwd = new THREE.Vector3(0, 0, -1).applyQuaternion(camera.quaternion);
      fwd.y = 0; fwd.normalize();
      const right = new THREE.Vector3(1, 0, 0).applyQuaternion(camera.quaternion);
      right.y = 0; right.normalize();
      camera.position.addScaledVector(fwd, ly * moveSpeed);
      camera.position.addScaledVector(right, lx * moveSpeed);
    }

    // LT/RT for up/down
    const lt = gp.buttons[6] ? gp.buttons[6].value : 0;
    const rt = gp.buttons[7] ? gp.buttons[7].value : 0;
    if (lt > 0.1) camera.position.y -= lt * THRUST_SPEED * dt;
    if (rt > 0.1) camera.position.y += rt * THRUST_SPEED * dt;
  }

  // Recording buttons (shared across modes)
  if (camMode !== 'orbit') {
    if (btnJustPressed(gp, 0)) captureFrame();           // A button
    if (btnJustPressed(gp, 1)) toggleRecord();           // B button
  }
}

// ---- Keyboard ----
const keys = {};
window.addEventListener('keydown', (e) => {
  if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA' || e.target.tagName === 'SELECT') return;
  keys[e.code] = true;

  // Shared controls
  if (e.code === 'Space') {
    e.preventDefault();
    toggleRecord();
  }
  if (e.code === 'KeyR' && !e.ctrlKey && !e.metaKey) {
    e.preventDefault();
    toggleRecord();
  }
  if (e.code === 'Tab') {
    e.preventDefault();
    const modes = ['orbit', 'drone', 'fps'];
    setMode(modes[(modes.indexOf(camMode) + 1) % 3]);
  }
});
window.addEventListener('keyup', (e) => { keys[e.code] = false; });

function handleKeyboardFly(dt) {
  if (camMode === 'orbit') return;
  const speed = MOVE_SPEED * dt;
  const turn = LOOK_SPEED * dt;

  const fwd = new THREE.Vector3(0, 0, -1).applyQuaternion(camera.quaternion);
  const right = new THREE.Vector3(1, 0, 0).applyQuaternion(camera.quaternion);

  // Movement
  if (keys['KeyW']) {
    if (camMode === 'fps') { fwd.y = 0; fwd.normalize(); }
    camera.position.addScaledVector(fwd, speed);
  }
  if (keys['KeyS']) {
    if (camMode === 'fps') { fwd.y = 0; fwd.normalize(); }
    camera.position.addScaledVector(fwd, -speed);
  }
  if (keys['KeyA']) {
    if (camMode === 'drone') {
      camera.rotateOnWorldAxis(new THREE.Vector3(0, 1, 0), turn * 1.5);
    } else {
      right.y = 0; right.normalize();
      camera.position.addScaledVector(right, -speed);
    }
  }
  if (keys['KeyD']) {
    if (camMode === 'drone') {
      camera.rotateOnWorldAxis(new THREE.Vector3(0, 1, 0), -turn * 1.5);
    } else {
      right.y = 0; right.normalize();
      camera.position.addScaledVector(right, speed);
    }
  }
  if (keys['KeyQ']) camera.position.y -= speed;
  if (keys['KeyE']) camera.position.y += speed;

  // Arrow keys for looking
  if (camMode === 'drone') {
    if (keys['ArrowUp']) camera.rotateX(turn);
    if (keys['ArrowDown']) camera.rotateX(-turn);
    if (keys['ArrowLeft']) camera.rotateOnWorldAxis(new THREE.Vector3(0, 1, 0), turn);
    if (keys['ArrowRight']) camera.rotateOnWorldAxis(new THREE.Vector3(0, 1, 0), -turn);
  } else {
    if (keys['ArrowUp']) camera.rotateX(turn);
    if (keys['ArrowDown']) camera.rotateX(-turn);
    if (keys['ArrowLeft']) camera.rotateY(turn);
    if (keys['ArrowRight']) camera.rotateY(-turn);
  }

  // Shift to boost
  if (keys['ShiftLeft'] || keys['ShiftRight']) {
    const boost = 3.0 * dt;
    camera.position.addScaledVector(fwd, boost);
  }
}

// ---- Clear ----
window.clearFrames = async function() {
  const sceneId = document.getElementById('scene-select').value;
  try { await apiCall('DELETE', `/clear_data/${sceneId}`); } catch {}
  frameId = 0;
  lastRecordedPose = null;
  document.getElementById('frame-count').textContent = '0';
};

// ---- Render Loop ----
const clock = new THREE.Clock();

function animate() {
  requestAnimationFrame(animate);
  const dt = Math.min(clock.getDelta(), 0.1); // cap to avoid jumps

  if (camMode === 'orbit') {
    controls.update();
  } else {
    const gp = pollGamepad();
    handleGamepadInput(gp, dt);
    handleKeyboardFly(dt);
  }

  updateHUD();
  updateFrustum();
  renderer.render(scene, camera);
}
animate();

// ---- Resize ----
window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});
</script>
</body>
</html>
