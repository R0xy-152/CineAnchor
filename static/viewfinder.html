<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CineAnchor Viewfinder</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: -apple-system, BlinkMacSystemFont, sans-serif; overflow: hidden; background: #111; }

  #canvas { display: block; }

  #panel {
    position: fixed; top: 16px; right: 16px; width: 280px;
    background: rgba(20,20,30,0.92); border: 1px solid rgba(255,255,255,0.1);
    border-radius: 12px; padding: 20px; color: #ccc; backdrop-filter: blur(12px);
    z-index: 10; font-size: 13px;
  }
  #panel h2 { font-size: 16px; font-weight: 600; color: #fff; margin-bottom: 14px; }
  #panel label { display: block; font-size: 11px; color: #888; margin-bottom: 3px; margin-top: 10px; }
  #panel select, #panel input, #panel textarea {
    width: 100%; padding: 7px 10px; border-radius: 6px; border: 1px solid rgba(255,255,255,0.12);
    background: rgba(255,255,255,0.06); color: #ddd; font-size: 12px; outline: none;
  }
  #panel textarea { resize: vertical; min-height: 40px; }
  #panel button {
    width: 100%; padding: 9px; border-radius: 6px; border: none;
    font-size: 13px; font-weight: 600; cursor: pointer; margin-top: 10px;
    transition: opacity 0.15s;
  }
  #panel button:active { opacity: 0.7; }
  .btn-record { background: #4f46e5; color: #fff; }
  .btn-render { background: #16a34a; color: #fff; }
  .btn-clear { background: rgba(255,255,255,0.08); color: #aaa; }
  .btn-demo { background: rgba(74,222,128,0.18); color: #4ade80; }
  .btn-demo:hover { background: rgba(74,222,128,0.28); }
  .btn-record.recording { background: #dc2626; animation: pulse 0.8s infinite; }
  @keyframes pulse { 50% { opacity: 0.6; } }

  #status { font-size: 11px; color: #888; margin-top: 12px; line-height: 1.5; }
  #status .ok { color: #4ade80; }
  #status .err { color: #f87171; }
  #frame-count { font-size: 28px; font-weight: 700; color: #fff; text-align: center; margin: 8px 0; }

  #pose-hud {
    position: fixed; bottom: 16px; left: 16px;
    background: rgba(20,20,30,0.85); border-radius: 8px;
    padding: 10px 14px; color: #888; font-size: 11px;
    font-family: 'SF Mono', 'Fira Code', monospace; z-index: 10;
  }

  #instructions {
    position: fixed; bottom: 16px; right: 16px;
    color: #555; font-size: 11px; text-align: right; z-index: 10;
    line-height: 1.6;
  }

  .btn-mode {
    display: inline-block; width: 32%; padding: 6px 0; border-radius: 5px; border: 1px solid rgba(255,255,255,0.15);
    background: rgba(255,255,255,0.04); color: #888; font-size: 11px; cursor: pointer; text-align: center;
    transition: all 0.15s;
  }
  .btn-mode.active { background: #4f46e5; color: #fff; border-color: #4f46e5; }
  .btn-mode:hover:not(.active) { background: rgba(255,255,255,0.08); color: #ccc; }

  #gamepad-status { font-size: 11px; margin-top: 4px; }
  #gamepad-status .connected { color: #4ade80; }
  #gamepad-status .disconnected { color: #666; }

  #render-progress { display: none; margin-top: 10px; }
  #render-progress .bar-bg { width: 100%; height: 4px; background: rgba(255,255,255,0.1); border-radius: 2px; overflow: hidden; }
  #render-progress .bar-fill { height: 100%; width: 0%; background: #16a34a; border-radius: 2px; transition: width 0.3s; }
  #render-progress .elapsed { font-size: 11px; color: #888; text-align: center; margin-top: 4px; }
  #video-result { display: none; margin-top: 10px; }
  #video-result video { width: 100%; border-radius: 6px; }
  #video-result a { color: #4ade80; font-size: 11px; display: block; text-align: center; margin-top: 4px; }
  #depth-preview { display: none; margin-top: 10px; }
  #depth-preview canvas { width: 100%; border-radius: 6px; }
  #depth-preview .label { font-size: 10px; color: #666; text-align: center; }
  #depth-preview .scale { display: flex; justify-content: space-between; font-size: 9px; color: #888; margin-top: 2px; }
</style>
</head>
<body>

<div id="panel">
  <h2>CineAnchor Viewfinder</h2>

  <label>场景</label>
  <select id="scene-select">
    <option value="test_scene">Test Cube</option>
    <option value="office_scene">Office</option>
    <option value="forest_path">Forest Path</option>
  </select>
  <div id="scene-desc" style="font-size:10px;color:#666;margin-top:2px"></div>

  <label>Prompt</label>
  <textarea id="prompt" placeholder="描述你想要的画面风格...">a colorful cube floating in dark space, studio lighting, high quality</textarea>

  <label>FPS</label>
  <input id="fps" type="number" value="8" min="1" max="60">

  <label>帧插值</label>
  <select id="interpolation">
    <option value="1">1x (不插值)</option>
    <option value="2">2x</option>
    <option value="3" selected>3x (推荐)</option>
    <option value="4">4x</option>
  </select>

  <details style="margin-top:8px">
    <summary style="color:#aaa;cursor:pointer;font-size:11px">高级参数</summary>
    <label>Conditioning Scale <span style="color:#888;font-weight:400" id="scale-val">1.7</span></label>
    <input id="cond-scale" type="range" min="0.5" max="2.0" step="0.05" value="1.7"
           oninput="document.getElementById('scale-val').textContent=this.value">
    <label>推理步数</label>
    <input id="num-steps" type="number" value="25" min="15" max="50" step="5">
    <label>Seed <button type="button" onclick="document.getElementById('seed').value=Math.floor(Math.random()*9999)" style="font-size:11px;padding:1px 4px">🎲</button></label>
    <input id="seed" type="number" value="42" min="0" max="9999">
  </details>

  <label>相机模式</label>
  <div style="display:flex;gap:4px">
    <button class="btn-mode active" id="btn-orbit" onclick="setMode('orbit')">Orbit</button>
    <button class="btn-mode" id="btn-drone" onclick="setMode('drone')">Drone</button>
    <button class="btn-mode" id="btn-fps" onclick="setMode('fps')">FPS</button>
  </div>

  <div id="frame-count">0</div>
  <div style="text-align:center;color:#666;font-size:11px;margin-top:-4px">已录制帧</div>

  <button class="btn-record" id="btn-record" onclick="toggleRecord()">录制帧</button>
  <button class="btn-render" id="btn-render" onclick="renderVideo()">生成视频</button>
  <button class="btn-clear" onclick="clearFrames()">清空帧</button>
  <button class="btn-demo" onclick="loadDemo()">🎬 Demo 视频</button>

  <div id="render-progress">
    <div class="bar-bg"><div class="bar-fill" id="progress-fill"></div></div>
    <div class="elapsed" id="progress-elapsed"></div>
  </div>
  <div id="video-result">
    <video id="result-video" controls loop></video>
    <a id="result-link" target="_blank" href="#">下载视频</a>
  </div>
  <div id="depth-preview">
    <div class="label">最新深度图 (伪彩色)</div>
    <canvas id="depth-canvas" width="256" height="144"></canvas>
    <div class="scale"><span>远</span><span>近</span></div>
  </div>

  <div id="status">
    <span id="api-status">API: 检测中...</span>
  </div>
</div>

<div id="pose-hud">
  <div style="color:#fff;font-weight:600;margin-bottom:2px">
    <span id="hud-mode">Orbit</span>
    <span id="gamepad-status" style="float:right"><span class="disconnected">no pad</span></span>
  </div>
  pos: <span id="hud-pos">--</span><br>
  rot: <span id="hud-quat">--</span>
</div>

<div id="instructions">
  <span id="instr-orbit">拖拽旋转 | 滚轮缩放 | 右键平移<br>R 录制 | Space 升高</span>
  <span id="instr-fly" style="display:none">WASD 移动 | Space/Ctrl 升降 | 鼠标转视角<br>R 录制 | 点击画布锁定鼠标</span>
</div>

<canvas id="canvas"></canvas>

<script type="importmap">
{
  "imports": {
    "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
    "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
  }
}
</script>

<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

// ---- Scene Setup ----
const canvas = document.getElementById('canvas');
const renderer = new THREE.WebGLRenderer({ canvas, antialias: true });
renderer.setPixelRatio(window.devicePixelRatio);
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.shadowMap.enabled = true;
renderer.toneMapping = THREE.ACESFilmicToneMapping;

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x1a1a2e);

const camera = new THREE.PerspectiveCamera(50, window.innerWidth / window.innerHeight, 0.1, 100);
camera.position.set(0, 0.5, 8);
camera.lookAt(0, 0, 0);

// Orbit Controls
const controls = new OrbitControls(camera, renderer.domElement);
controls.target.set(0, 0, 0);
controls.enableDamping = true;
controls.dampingFactor = 0.08;
controls.minDistance = 1.5;
controls.maxDistance = 20;
controls.update();

// Grid
scene.add(new THREE.GridHelper(10, 20, 0x333355, 0x222244));

// Axes
const axes = new THREE.AxesHelper(3);
scene.add(axes);

// Scene proxy group (动态切换场景代理模型)
const proxyGroup = new THREE.Group();
scene.add(proxyGroup);

// Camera trajectory line (录制轨迹可视化)
const trajectoryPositions = [];
const trajectoryGeom = new THREE.BufferGeometry();
const trajectoryMat = new THREE.LineBasicMaterial({ color: 0x4ade80, linewidth: 1, transparent: true, opacity: 0.7 });
const trajectoryLine = new THREE.Line(trajectoryGeom, trajectoryMat);
trajectoryLine.visible = false;
scene.add(trajectoryLine);

// Trajectory waypoints (small spheres at each recorded position)
const waypointGroup = new THREE.Group();
waypointGroup.visible = false;
scene.add(waypointGroup);
const waypointGeom = new THREE.SphereGeometry(0.06, 6, 6);
const waypointMat = new THREE.MeshBasicMaterial({ color: 0x4ade80 });

function updateTrajectory(pos) {
  trajectoryPositions.push(pos.clone());
  const pts = trajectoryPositions;
  trajectoryGeom.dispose();
  trajectoryGeom.setFromPoints(pts);
  trajectoryLine.geometry = trajectoryGeom;
  trajectoryLine.visible = pts.length > 1;

  // Add waypoint sphere
  const dot = new THREE.Mesh(waypointGeom, waypointMat);
  dot.position.copy(pos);
  waypointGroup.add(dot);
  waypointGroup.visible = true;
}

function clearTrajectory() {
  trajectoryPositions.length = 0;
  trajectoryGeom.dispose();
  trajectoryLine.visible = false;
  while (waypointGroup.children.length > 0) {
    waypointGroup.remove(waypointGroup.children[0]);
  }
  waypointGroup.visible = false;
}

function clearProxy() {
  while (proxyGroup.children.length > 0) {
    const child = proxyGroup.children[0];
    if (child.geometry) child.geometry.dispose();
    if (child.material) {
      if (Array.isArray(child.material)) {
        child.material.forEach(m => m.dispose());
      } else {
        child.material.dispose();
      }
    }
    proxyGroup.remove(child);
  }
}

function addBox(center, halfSize, color, opacity) {
  const geo = new THREE.BoxGeometry(halfSize[0]*2, halfSize[1]*2, halfSize[2]*2);
  const mat = new THREE.MeshStandardMaterial({
    color, roughness: 0.3, metalness: 0.1, transparent: true, opacity
  });
  const mesh = new THREE.Mesh(geo, mat);
  mesh.position.set(center[0], center[1], center[2]);
  proxyGroup.add(mesh);
  // wireframe overlay
  const wireGeo = new THREE.BoxGeometry(halfSize[0]*2, halfSize[1]*2, halfSize[2]*2);
  const wireMat = new THREE.MeshBasicMaterial({
    color, wireframe: true, transparent: true, opacity: opacity * 0.6
  });
  const wire = new THREE.Mesh(wireGeo, wireMat);
  wire.position.copy(mesh.position);
  proxyGroup.add(wire);
}

function addSphere(center, radius, color, opacity) {
  const geo = new THREE.SphereGeometry(radius, 32, 16);
  const mat = new THREE.MeshStandardMaterial({
    color, roughness: 0.3, metalness: 0.1, transparent: true, opacity
  });
  const mesh = new THREE.Mesh(geo, mat);
  mesh.position.set(center[0], center[1], center[2]);
  proxyGroup.add(mesh);
  const wireGeo = new THREE.SphereGeometry(radius, 24, 12);
  const wireMat = new THREE.MeshBasicMaterial({
    color, wireframe: true, transparent: true, opacity: opacity * 0.6
  });
  const wire = new THREE.Mesh(wireGeo, wireMat);
  wire.position.copy(mesh.position);
  proxyGroup.add(wire);
}

function buildSceneProxy(sceneId) {
  clearProxy();
  if (sceneId === 'test_scene') {
    addBox([0, 0, 0], [1, 1, 1], 0x6366f1, 0.5);
  } else if (sceneId === 'office_scene') {
    // 地板
    addBox([0, -0.5, 0], [3, 0.05, 4], 0x334455, 0.4);
    // 桌子
    addBox([0, 0.0, 0], [1, 0.8, 2], 0x8B7355, 0.5);
    // 桌上球体
    addSphere([0, 0.5, 0], 0.4, 0x44aaff, 0.5);
    // 椅子
    addBox([2, -0.3, -0.5], [0.3, 0.5, 0.3], 0x666666, 0.5);
    // 窗户
    addBox([-1.5, 0.3, -2], [0.5, 0.8, 0.1], 0x88ccff, 0.4);
  } else if (sceneId === 'forest_path') {
    // 地面
    addBox([0, -0.5, 0], [4, 0.05, 6], 0x2d5a1e, 0.4);
    // 近处树
    addBox([-2, 0.5, 2], [0.3, 2, 0.3], 0x5a3a1e, 0.5);
    addBox([2, 0.5, 2], [0.3, 2, 0.3], 0x5a3a1e, 0.5);
    addBox([-2.5, 0.5, -2], [0.3, 2, 0.3], 0x5a3a1e, 0.5);
    addBox([2.5, 0.5, -2], [0.3, 2, 0.3], 0x5a3a1e, 0.5);
    // 远处树
    addBox([-3, 0.75, 5], [0.35, 2.5, 0.35], 0x4a2a0e, 0.4);
    addBox([3, 0.75, 5], [0.35, 2.5, 0.35], 0x4a2a0e, 0.4);
  }
}

// Scene descriptions (synced from API /scenes)
const SCENE_DESC = {
  test_scene: '一个彩色立方体悬浮在空间中',
  office_scene: '有桌椅的简单办公室，窗外城市景观',
  forest_path: '穿过茂密森林的小径，阳光洒落',
};

// 监听场景切换
document.getElementById('scene-select').addEventListener('change', (e) => {
  const sceneId = e.target.value;
  // 有已录制帧时自动清除
  if (frameId > 0) {
    clearFrames();
  }
  buildSceneProxy(sceneId);
  document.getElementById('scene-desc').textContent = SCENE_DESC[sceneId] || '';
});

// 初始加载
buildSceneProxy('test_scene');
document.getElementById('scene-desc').textContent = SCENE_DESC['test_scene'];

// Sync available scenes from API
async function refreshScenes() {
  try {
    const data = await apiCall('GET', '/scenes');
    const select = document.getElementById('scene-select');
    const current = select.value;
    select.innerHTML = '';
    for (const [id, desc] of Object.entries(data.scenes)) {
      const opt = document.createElement('option');
      opt.value = id;
      opt.textContent = id.replace(/_/g, ' ').replace(/\b\w/g, c => c.toUpperCase());
      select.appendChild(opt);
      SCENE_DESC[id] = typeof desc === 'string' ? desc : '';
    }
    if ([...select.options].some(o => o.value === current)) {
      select.value = current;
    }
    document.getElementById('scene-desc').textContent = SCENE_DESC[select.value] || '';
  } catch (e) {
    // Keep defaults
    document.getElementById('scene-desc').textContent = SCENE_DESC[document.getElementById('scene-select').value] || '';
  }
}

// Lighting
scene.add(new THREE.AmbientLight(0x404060, 2));
const key = new THREE.DirectionalLight(0xffffff, 3);
key.position.set(5, 8, 3);
scene.add(key);
const fill = new THREE.DirectionalLight(0x8888ff, 1);
fill.position.set(-3, 1, -2);
scene.add(fill);

// Camera frustum helper (shows where the 3DGS camera is looking)
const frustumHelper = new THREE.CameraHelper(
  new THREE.PerspectiveCamera(50, 512 / 288, 0.1, 10)
);
scene.add(frustumHelper);

// ---- API Client ----
const API = window.location.origin;
let apiOk = false;
let frameId = 0;

async function checkAPI() {
  try {
    const r = await fetch(`${API}/health`);
    const d = await r.json();
    apiOk = d.status === 'ok';
    document.getElementById('api-status').innerHTML =
      `API: <span class="ok">${d.render_mode}</span> (${d.platform})`;
  } catch {
    document.getElementById('api-status').innerHTML =
      'API: <span class="err">离线</span>';
  }
}
checkAPI();
refreshScenes();
setInterval(checkAPI, 5000);

async function apiCall(method, path, body) {
  const opts = { method, headers: { 'Content-Type': 'application/json' } };
  if (body) opts.body = JSON.stringify(body);
  const r = await fetch(`${API}${path}`, opts);
  if (!r.ok) {
    const e = await r.json().catch(() => ({}));
    throw new Error(e.detail || r.statusText);
  }
  return r.json();
}

// ---- Camera Pose ----
function getPose() {
  return {
    position: { x: camera.position.x, y: camera.position.y, z: camera.position.z },
    rotation: { x: camera.quaternion.x, y: camera.quaternion.y, z: camera.quaternion.z, w: camera.quaternion.w }
  };
}

function updateHUD() {
  const p = camera.position;
  const q = camera.quaternion;
  document.getElementById('hud-pos').textContent =
    `${p.x.toFixed(2)}, ${p.y.toFixed(2)}, ${p.z.toFixed(2)}`;
  document.getElementById('hud-quat').textContent =
    `${q.x.toFixed(3)}, ${q.y.toFixed(3)}, ${q.z.toFixed(3)}, ${q.w.toFixed(3)}`;
}

// Update frustum helper to follow the camera
function updateFrustum() {
  const fc = frustumHelper.camera;
  fc.position.copy(camera.position);
  fc.quaternion.copy(camera.quaternion);
  fc.aspect = camera.aspect;
  fc.updateProjectionMatrix();
  fc.updateMatrixWorld();
  frustumHelper.update();
}

// ---- Recording ----
let recording = false;
let recordInterval = null;
let lastRecordedPose = null;

window.toggleRecord = async function() {
  if (recording) {
    stopRecording();
    return;
  }

  const sceneId = document.getElementById('scene-select').value;
  if (!apiOk) { alert('API 离线，请先启动后端: python main.py'); return; }

  // Initialize scene
  try {
    await apiCall('POST', `/scene/create?scene_id=${sceneId}`);
  } catch (e) {
    alert(`场景初始化失败: ${e.message}`);
    return;
  }

  startRecording();
};

function startRecording() {
  recording = true;
  const btn = document.getElementById('btn-record');
  btn.textContent = '停止录制 (R)';
  btn.classList.add('recording');

  // Capture one frame immediately
  captureFrame();

  // Then capture every 500ms while camera is moving
  recordInterval = setInterval(() => {
    const pose = getPose();
    // Only capture if camera moved significantly
    if (lastRecordedPose) {
      const dp = Math.sqrt(
        (pose.position.x - lastRecordedPose.position.x) ** 2 +
        (pose.position.y - lastRecordedPose.position.y) ** 2 +
        (pose.position.z - lastRecordedPose.position.z) ** 2
      );
      if (dp < 0.1) return; // skip if barely moved
    }
    captureFrame();
  }, 500);
}

function stopRecording() {
  recording = false;
  const btn = document.getElementById('btn-record');
  btn.textContent = '录制帧';
  btn.classList.remove('recording');
  if (recordInterval) { clearInterval(recordInterval); recordInterval = null; }
  document.getElementById('status').innerHTML = `已录制 <b>${frameId}</b> 帧。点击"生成视频"开始渲染。`;
}

async function captureFrame() {
  const sceneId = document.getElementById('scene-select').value;
  const pose = getPose();
  lastRecordedPose = pose;

  try {
    const result = await apiCall('POST', '/camera/record_frame', {
      scene_id: sceneId,
      frame_id: frameId,
      camera_pose: pose
    });
    frameId++;
    document.getElementById('frame-count').textContent = frameId;
    // Update 3D trajectory
    updateTrajectory(camera.position);
    // Show colorized depth preview
    showDepthPreview(API + result.depth_map_url);
  } catch (e) {
    console.error('Record frame failed:', e);
  }
}

// Single frame capture
window.captureSingleFrame = captureFrame;

// ---- Pseudo-color depth preview ----
const DEPTH_COLORMAP = (() => {
  // Inferno-style: 黑→紫→红→橙→黄→白
  const stops = [
    [0,     [0,0,4]],       // 远: 深黑紫
    [0.25,  [58,17,110]],   // 紫
    [0.5,   [188,55,84]],   // 红
    [0.75,  [248,142,36]],  // 橙
    [1.0,   [252,254,164]], // 近: 亮黄白
  ];
  const lut = new Uint8Array(256 * 3);
  for (let i = 0; i < 256; i++) {
    const t = i / 255;
    let lo = stops[0], hi = stops[stops.length - 1];
    for (let s = 1; s < stops.length; s++) {
      if (t <= stops[s][0]) { hi = stops[s]; lo = stops[s-1]; break; }
    }
    const frac = (t - lo[0]) / (hi[0] - lo[0] + 0.0001);
    lut[i*3]   = lo[1][0] + (hi[1][0] - lo[1][0]) * frac;
    lut[i*3+1] = lo[1][1] + (hi[1][1] - lo[1][1]) * frac;
    lut[i*3+2] = lo[1][2] + (hi[1][2] - lo[1][2]) * frac;
  }
  return lut;
})();

function showDepthPreview(url) {
  const preview = document.getElementById('depth-preview');
  const canvas = document.getElementById('depth-canvas');
  preview.style.display = 'block';

  const img = new Image();
  img.crossOrigin = 'anonymous';
  img.onload = () => {
    canvas.width = img.width;
    canvas.height = img.height;
    const ctx = canvas.getContext('2d');
    ctx.drawImage(img, 0, 0);
    const data = ctx.getImageData(0, 0, canvas.width, canvas.height);
    const px = data.data;
    for (let i = 0; i < px.length; i += 4) {
      const gray = px[i];  // R channel = grayscale
      const j = gray * 3;
      px[i]   = DEPTH_COLORMAP[j];
      px[i+1] = DEPTH_COLORMAP[j+1];
      px[i+2] = DEPTH_COLORMAP[j+2];
    }
    ctx.putImageData(data, 0, 0);
    canvas.style.aspectRatio = `${img.width}/${img.height}`;
  };
  img.src = url;
}

// ---- Render ----
window.renderVideo = async function() {
  if (frameId === 0) { alert('请先录制帧'); return; }
  if (!apiOk) { alert('API 离线'); return; }

  const sceneId = document.getElementById('scene-select').value;
  const prompt = document.getElementById('prompt').value;
  const fps = parseInt(document.getElementById('fps').value) || 8;

  const btn = document.getElementById('btn-render');
  const progress = document.getElementById('render-progress');
  const fill = document.getElementById('progress-fill');
  const elapsed = document.getElementById('progress-elapsed');
  const videoResult = document.getElementById('video-result');
  const videoEl = document.getElementById('result-video');
  const linkEl = document.getElementById('result-link');

  btn.textContent = '渲染中...';
  btn.disabled = true;
  videoResult.style.display = 'none';
  progress.style.display = 'block';
  fill.style.width = '0%';
  const start = Date.now();
  const tick = setInterval(() => {
    const secs = Math.floor((Date.now() - start) / 1000);
    elapsed.textContent = `渲染中... ${secs}s`;
    fill.style.width = Math.min(secs / 60 * 100, 90) + '%';
  }, 500);

  try {
    const interp = parseInt(document.getElementById('interpolation').value) || 1;
    const condScale = parseFloat(document.getElementById('cond-scale').value) || 1.7;
    const numSteps = parseInt(document.getElementById('num-steps').value) || 25;
    const seedVal = parseInt(document.getElementById('seed').value) || 42;
    const result = await apiCall('POST', '/render/video', {
      scene_id: sceneId, prompt, fps, interpolation: interp,
      conditioning_scale: condScale, num_steps: numSteps, seed: seedVal
    });
    clearInterval(tick);
    fill.style.width = '100%';
    const total = Math.floor((Date.now() - start) / 1000);
    elapsed.textContent = `完成 (${total}s)`;
    setTimeout(() => { progress.style.display = 'none'; }, 2000);

    const videoUrl = API + result.video_url;
    videoEl.src = videoUrl;
    linkEl.href = videoUrl;
    videoResult.style.display = 'block';
    document.getElementById('status').innerHTML = `<span class="ok">✓ 视频已生成</span>`;
  } catch (e) {
    clearInterval(tick);
    progress.style.display = 'none';
    document.getElementById('status').innerHTML = `<span class="err">渲染失败: ${e.message}</span>`;
  }
  btn.textContent = '生成视频';
  btn.disabled = false;
};

// Load pre-rendered demo video (from 小win's GPU pipeline)
window.loadDemo = function() {
  const videoResult = document.getElementById('video-result');
  const videoEl = document.getElementById('result-video');
  const linkEl = document.getElementById('result-link');
  const demoUrl = 'static/demo_output.mp4';
  videoEl.src = demoUrl;
  linkEl.href = demoUrl;
  videoResult.style.display = 'block';
  document.getElementById('status').innerHTML = `<span class="ok">▶ Demo 视频已加载 (SD 1.5 + AnimateDiff)</span>`;
};

// ---- Camera Mode System ----
let camMode = 'orbit'; // orbit | drone | fps

// 摇杆物理参数 (模仿 Unreal Engine 手感模型)
const DEADZONE = 0.10;
const STICK_POWER = 2.5;       // 响应曲线 (>2 中心区极精细)
const ACCEL = 4.0;             // 加速灵敏度 (越高越快达到目标速度)
const DECEL = 7.0;             // 减速灵敏度 (比加速快 = 松手即停)
const MOVE_SPEED = 4.0;        // 最大移动速度 units/sec
const LOOK_SPEED = 1.8;        // 最大旋转速度 rad/sec
const THRUST_SPEED = 3.0;      // 升降速度

window.setMode = function(mode) {
  camMode = mode;
  document.getElementById('btn-orbit').classList.toggle('active', mode === 'orbit');
  document.getElementById('btn-drone').classList.toggle('active', mode === 'drone');
  document.getElementById('btn-fps').classList.toggle('active', mode === 'fps');
  document.getElementById('hud-mode').textContent = mode.charAt(0).toUpperCase() + mode.slice(1);
  document.getElementById('instr-orbit').style.display = mode === 'orbit' ? '' : 'none';
  document.getElementById('instr-fly').style.display = mode !== 'orbit' ? '' : 'none';
  controls.enabled = mode === 'orbit';
  // 切模式时重置物理状态
  velMove.set(0, 0, 0);
  velLook.set(0, 0);
  if (mode !== 'orbit') controls.target.copy(camera.position).add(
    new THREE.Vector3(0, 0, -1).applyQuaternion(camera.quaternion)
  );
};

// ---- 速度物理 (加速度模型) ----
// 当前速度 → 逐帧 lerp 到目标速度 → 丝滑手感
const velMove = new THREE.Vector3();   // 当前移动速度 (world units/s)
const velLook = new THREE.Vector2();   // 当前旋转速度 (rad/s)

function stickCurve(gp, idx) {
  const raw = gp.axes[idx] || 0;
  const abs = Math.abs(raw);
  if (abs < DEADZONE) return 0;
  const norm = (abs - DEADZONE) / (1 - DEADZONE);
  return Math.sign(raw) * Math.pow(norm, STICK_POWER);
}

function lerp(a, b, t) { return a + (b - a) * t; }

function updateVelocity(dt) {
  // 目标速度 (从手柄/键盘累积)
  const targetMove = new THREE.Vector3();
  const targetLook = new THREE.Vector2();

  const gp = pollGamepad();
  if (gp) readGamepadTarget(gp, targetMove, targetLook);
  if (camMode !== 'orbit') readKeyboardTarget(targetMove, targetLook);

  // 加速度平滑: lerp 当前速度 → 目标速度
  // 松手时 (目标=0) 用更快 decel，推动时用 accel
  const t = dt * (targetMove.length() > 0.01 ? ACCEL : DECEL);
  velMove.lerp(targetMove, Math.min(t, 1));

  const tl = dt * (targetLook.length() > 0.01 ? ACCEL : DECEL);
  velLook.x = lerp(velLook.x, targetLook.x, Math.min(tl, 1));
  velLook.y = lerp(velLook.y, targetLook.y, Math.min(tl, 1));

  // 应用速度到相机
  if (velMove.length() > 0.0005) {
    // 在相机本地坐标系中移动
    const fwd = new THREE.Vector3(0, 0, -1).applyQuaternion(camera.quaternion);
    const right = new THREE.Vector3(1, 0, 0).applyQuaternion(camera.quaternion);

    if (camMode === 'fps') { fwd.y = 0; fwd.normalize(); right.y = 0; right.normalize(); }

    const localMove = new THREE.Vector3()
      .addScaledVector(right, velMove.x)
      .addScaledVector(new THREE.Vector3(0, 1, 0), velMove.y)
      .addScaledVector(fwd, velMove.z);

    camera.position.addScaledVector(localMove, dt);
  }

  if (Math.abs(velLook.x) > 0.0002 || Math.abs(velLook.y) > 0.0002) {
    if (camMode === 'drone') {
      camera.rotateOnWorldAxis(new THREE.Vector3(0, 1, 0), -velLook.x * dt);
      camera.rotateX(velLook.y * dt);
    } else {
      camera.rotateY(-velLook.x * dt);
      camera.rotateX(velLook.y * dt);
    }
  }
}

// ---- Gamepad → 目标速度 ----
function readGamepadTarget(gp, targetMove, targetLook) {
  // Shared: Select to cycle modes
  if (btnJustPressed(gp, 8)) {
    const modes = ['orbit', 'drone', 'fps'];
    setMode(modes[(modes.indexOf(camMode) + 1) % 3]);
  }

  if (camMode === 'drone') {
    targetMove.y = -stickCurve(gp, 1) * THRUST_SPEED;        // 左 Y → 升降
    targetLook.x = stickCurve(gp, 0) * LOOK_SPEED;            // 左 X → 偏航
    targetLook.y = -stickCurve(gp, 3) * LOOK_SPEED;           // 右 Y → 俯仰

    // RT → 前推
    const rt = gp.buttons[7] ? gp.buttons[7].value : 0;
    if (rt > 0.1) targetMove.z = rt * MOVE_SPEED;
  }

  if (camMode === 'fps') {
    targetMove.x = stickCurve(gp, 0) * MOVE_SPEED;            // 左 X → 右移
    targetMove.z = -stickCurve(gp, 1) * MOVE_SPEED;           // 左 Y → 前进
    targetLook.x = stickCurve(gp, 2) * LOOK_SPEED;            // 右 X → 水平看
    targetLook.y = -stickCurve(gp, 3) * LOOK_SPEED;           // 右 Y → 垂直看

    const lt = gp.buttons[6] ? gp.buttons[6].value : 0;
    const rt = gp.buttons[7] ? gp.buttons[7].value : 0;
    if (lt > 0.1) targetMove.y = -lt * THRUST_SPEED;
    if (rt > 0.1) targetMove.y = rt * THRUST_SPEED;
  }

  // Recording
  if (camMode !== 'orbit') {
    if (btnJustPressed(gp, 0)) captureFrame();
    if (btnJustPressed(gp, 1)) toggleRecord();
  }
}

// ---- Keyboard → 目标速度 ----
const keys = {};

function readKeyboardTarget(targetMove, targetLook) {
  const spd = MOVE_SPEED;
  const lspd = LOOK_SPEED;

  if (keys['KeyW']) targetMove.z = spd;
  if (keys['KeyS']) targetMove.z = -spd;
  if (keys['KeyA']) camMode === 'drone' ? (targetLook.x = lspd * 1.5) : (targetMove.x = -spd);
  if (keys['KeyD']) camMode === 'drone' ? (targetLook.x = -lspd * 1.5) : (targetMove.x = spd);
  if (keys['ControlLeft'] || keys['ControlRight']) targetMove.y = -THRUST_SPEED;
  if (keys['KeyE'] || keys['Space']) targetMove.y = THRUST_SPEED;

  if (camMode === 'drone') {
    if (keys['ArrowUp']) targetLook.y = lspd;
    if (keys['ArrowDown']) targetLook.y = -lspd;
    if (keys['ArrowLeft']) targetLook.x = lspd;
    if (keys['ArrowRight']) targetLook.x = -lspd;
  } else {
    if (keys['ArrowUp']) targetLook.y = lspd;
    if (keys['ArrowDown']) targetLook.y = -lspd;
    if (keys['ArrowLeft']) targetLook.x = lspd;
    if (keys['ArrowRight']) targetLook.x = -lspd;
  }

  if (keys['ShiftLeft'] || keys['ShiftRight']) {
    targetMove.z = spd * 3;
  }
}

window.addEventListener('keydown', (e) => {
  if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA' || e.target.tagName === 'SELECT') return;
  keys[e.code] = true;

  if (e.code === 'KeyR' && !e.ctrlKey && !e.metaKey) { e.preventDefault(); toggleRecord(); }
  if (e.code === 'Tab') {
    e.preventDefault();
    const modes = ['orbit', 'drone', 'fps'];
    setMode(modes[(modes.indexOf(camMode) + 1) % 3]);
  }
});
window.addEventListener('keyup', (e) => { keys[e.code] = false; });

// ---- Gamepad 连接检测 ----
let gamepadConnected = false;
let lastGamepadButtons = {};

function pollGamepad() {
  const pads = navigator.getGamepads();
  let active = null;
  for (const p of pads) { if (p) { active = p; break; } }
  if (!active) {
    if (gamepadConnected) {
      gamepadConnected = false;
      document.getElementById('gamepad-status').innerHTML = '<span class="disconnected">no pad</span>';
    }
    return null;
  }
  if (!gamepadConnected) {
    gamepadConnected = true;
    document.getElementById('gamepad-status').innerHTML = '<span class="connected">pad ok</span>';
  }
  return active;
}

function btnJustPressed(gp, idx) {
  const pressed = gp.buttons[idx] && gp.buttons[idx].pressed;
  const was = lastGamepadButtons[idx] || false;
  lastGamepadButtons[idx] = pressed;
  return pressed && !was;
}

// ---- Mouse Look (FPS/Drone 模式指针锁定) ----
const MOUSE_SENSITIVITY = 0.002;
let pointerLocked = false;

canvas.addEventListener('click', () => {
  if (camMode !== 'orbit' && !pointerLocked) {
    canvas.requestPointerLock();
  }
});

document.addEventListener('pointerlockchange', () => {
  pointerLocked = document.pointerLockElement === canvas;
});

document.addEventListener('mousemove', (e) => {
  if (!pointerLocked || camMode === 'orbit') return;
  velLook.x += e.movementX * MOUSE_SENSITIVITY * LOOK_SPEED * 30;
  velLook.y += e.movementY * MOUSE_SENSITIVITY * LOOK_SPEED * 30;
});

// ---- Clear ----
window.clearFrames = function() {
  fetch(`${API}/clear_data/${document.getElementById('scene-select').value}`, { method: 'DELETE' }).catch(() => {});
  frameId = 0;
  lastRecordedPose = null;
  document.getElementById('frame-count').textContent = '0';
  document.getElementById('video-result').style.display = 'none';
  document.getElementById('depth-preview').style.display = 'none';
  document.getElementById('render-progress').style.display = 'none';
  document.getElementById('status').innerHTML = '帧已清空';
  clearTrajectory();
}

// ---- Render Loop ----
const clock = new THREE.Clock();

function animate() {
  requestAnimationFrame(animate);
  const dt = Math.min(clock.getDelta(), 0.1);

  if (camMode === 'orbit') {
    controls.update();
  } else {
    updateVelocity(dt);
  }

  updateHUD();
  updateFrustum();
  renderer.render(scene, camera);
}
animate();

// ---- Resize ----
window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});
</script>
