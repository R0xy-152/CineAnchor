<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AnchorVerse — Multiplayer World</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #0a0a14; overflow: hidden; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }

  /* 加入界面 */
  #join-overlay {
    position: fixed; inset: 0; display: flex; align-items: center; justify-content: center;
    background: rgba(10,10,20,0.95); z-index: 200;
  }
  #join-card {
    background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1);
    border-radius: 16px; padding: 40px 32px; max-width: 400px; width: 90vw; text-align: center;
  }
  #join-card h2 { color: #fff; font-size: 24px; margin-bottom: 8px; }
  #join-card h2 span { color: #7c3aed; }
  #join-card .subtitle { color: #888; font-size: 14px; margin-bottom: 24px; }
  #join-card label { display: block; color: #999; font-size: 12px; text-align: left; margin-bottom: 4px; }
  #join-card input {
    width: 100%; padding: 10px 14px; border-radius: 8px;
    border: 1px solid rgba(255,255,255,0.1); background: rgba(0,0,0,0.4);
    color: #fff; font-size: 14px; margin-bottom: 14px; outline: none;
  }
  #join-card input:focus { border-color: #7c3aed; }
  .color-row { display: flex; gap: 8px; margin-bottom: 14px; }
  .color-dot { width: 28px; height: 28px; border-radius: 50%; cursor: pointer; border: 2px solid transparent; transition: border-color 0.1s; }
  .color-dot:hover { border-color: #fff; }
  .color-dot.selected { border-color: #fff; }
  #join-btn {
    width: 100%; padding: 12px; border-radius: 8px; border: none;
    background: #7c3aed; color: #fff; font-size: 15px; font-weight: 600; cursor: pointer;
    margin-top: 8px; transition: background 0.15s;
  }
  #join-btn:hover { background: #6d28d9; }
  #join-btn:disabled { background: #444; cursor: default; }

  /* HUD */
  #hud {
    position: fixed; bottom: 16px; left: 50%; transform: translateX(-50%);
    color: rgba(255,255,255,0.5); font-size: 12px; z-index: 50;
    pointer-events: none; text-align: center;
  }
  #hud .key { color: #7c3aed; }

  /* 连接状态 */
  #conn-status {
    position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
    color: #ccc; font-size: 15px; z-index: 150; display: none;
    text-align: center;
  }
  #conn-status .spinner {
    width: 32px; height: 32px; margin: 0 auto 12px;
    border: 3px solid rgba(255,255,255,0.1);
    border-top-color: #7c3aed; border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* 回合指示器 */
  #turn-indicator {
    position: fixed; top: 16px; left: 50%; transform: translateX(-50%);
    background: rgba(0,0,0,0.7); border: 1px solid rgba(124,58,237,0.3);
    border-radius: 20px; padding: 6px 20px; z-index: 105;
    color: #fff; font-size: 13px; font-weight: 600;
    display: none; pointer-events: none;
  }
  #turn-indicator .turn-dot {
    display: inline-block; width: 8px; height: 8px; border-radius: 50%;
    margin-right: 6px; vertical-align: middle;
  }

  /* 系统消息 toast */
  .toast {
    position: fixed; top: 80px; left: 50%; transform: translateX(-50%);
    color: #ccc; font-size: 13px; z-index: 110; pointer-events: none;
    background: rgba(0,0,0,0.6); padding: 6px 16px; border-radius: 20px;
    animation: toastIn 0.3s ease, toastOut 0.3s ease 4s forwards;
  }
  @keyframes toastIn { from { opacity: 0; transform: translateX(-50%) translateY(-10px); } to { opacity: 1; transform: translateX(-50%) translateY(0); } }
  @keyframes toastOut { from { opacity: 1; } to { opacity: 0; } }
</style>
</head>
<body>

<!-- 加入界面 -->
<div id="join-overlay">
  <div id="join-card">
    <h2><span>Anchor</span>Verse</h2>
    <p class="subtitle" id="join-sub">加入多人世界</p>
    <label>显示名称</label>
    <input id="name-input" placeholder="输入你的名字..." maxlength="20" value="Player">
    <label>选择颜色</label>
    <div class="color-row" id="color-picker"></div>
    <label>世界模板</label>
    <select id="template-select" style="width:100%;padding:10px 14px;border-radius:8px;border:1px solid rgba(255,255,255,0.1);background:rgba(0,0,0,0.4);color:#fff;font-size:14px;margin-bottom:14px;outline:none">
      <option value="floating_island">浮空岛 — 云海仙境</option>
      <option value="castle_hall">城堡大厅 — 哥特石柱</option>
      <option value="space_station">太空站 — 星轨环绕</option>
      <option value="forest_clearing">森林空地 — 巨树环绕</option>
      <option value="desert_oasis">沙漠绿洲 — 棕榈清泉</option>
      <option value="void_platform">虚空平台 — 霓虹极简</option>
    </select>
    <button id="join-btn">进入世界</button>
  </div>
</div>

<!-- HUD -->
<div id="hud">
  <span class="key">WASD</span> 移动 &nbsp;
  <span class="key">鼠标</span> 视角 &nbsp;
  <span class="key">Space</span> 跳跃 &nbsp;
  <span class="key">T</span> 聊天 &nbsp;
  <span class="key">V</span> 语音 &nbsp;
  <span class="key">E</span> 编辑 &nbsp;
  <span class="key">G</span> 抓取 &nbsp;
  <span class="key">C</span> 下棋 &nbsp;
  <span class="key">K</span> 卡牌 &nbsp;
  <span class="key">R</span> 骰子 &nbsp;
  <span class="key">B</span> 回合 &nbsp;
  <span class="key">左键</span> 放置 &nbsp;
  <span class="key">右键</span> 删除
</div>

<div id="conn-status"><div class="spinner"></div>正在连接...</div>

<div id="turn-indicator"><span class="turn-dot"></span><span id="turn-text"></span></div>

<!-- Three.js + Addons -->
<script type="importmap">
{
  "imports": {
    "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
    "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
  }
}
</script>

<script type="module">
import * as THREE from 'three';
import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
import { DRACOLoader } from 'three/addons/loaders/DRACOLoader.js';
import { MultiplayerClient } from '../js/websocket-client.js';
import { AvatarSystem } from '../js/avatar-system.js';
import { ChatUI } from '../js/chat-ui.js';
import { Presence } from '../js/presence.js';
import { EditorMode } from '../js/editor-mode.js';
import { buildWorld } from '../js/world-builder.js';
import { generateFromPrompt } from '../js/ai-generator.js';
import { ChessUI } from '../js/chess-ui.js';
import { VoiceChat } from '../js/voice-chat.js';
import { CardTableUI } from '../js/card-ui.js';

// ── 全局状态 ──────────────────────────────────────────────
const params = new URLSearchParams(location.search);
const ROOM_ID = params.get('room');
const SCENE_ID = params.get('scene');

let roomId = ROOM_ID;
let displayName = 'Player';
let avatarColor = '#6366f1';

// ── Three.js 初始化 ───────────────────────────────────────

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.shadowMap.enabled = true;
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.2;
document.body.appendChild(renderer.domElement);

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x87ceeb);  // 天蓝色
scene.fog = new THREE.Fog(0xc8dce8, 30, 80);    // 远处淡雾

// ── 世界构建 (动态场景模板) ──────────────────────────────────

// 默认世界配置 (收到 room_state 后可能更新)
const DEFAULT_WORLD_CONFIG = {
    sky_color: '#87ceeb', fog_color: '#c8dce8', fog_near: 30, fog_far: 80,
    terrain_type: 'floating_island',
    terrain_config: { island_height: 10, island_radius: 4.5, grass_color: '#4a7c3f' },
    ambient_light: '#8899bb', ambient_intensity: 2.0,
    sun_color: '#ffeedd', sun_intensity: 4.0,
};

let worldData = buildWorld(scene, DEFAULT_WORLD_CONFIG);
let ISLAND_CENTER = worldData.islandCenter;
let ISLAND_TOP_RADIUS = worldData.islandRadius;

function getSurfaceY() { return worldData.surfaceY; }

const camera = new THREE.PerspectiveCamera(70, window.innerWidth / window.innerHeight, 0.1, 150);
camera.position.set(0, ISLAND_CENTER.y + 1.6, 5);

// 模型组 — GLB 加载的模型也放到岛屿上
const modelGroup = new THREE.Group();
modelGroup.position.copy(ISLAND_CENTER);
scene.add(modelGroup);


// ── GLB 加载器 ────────────────────────────────────────────

const dracoLoader = new DRACOLoader();
dracoLoader.setDecoderPath('https://unpkg.com/three@0.160.0/examples/jsm/libs/draco/');
const gltfLoader = new GLTFLoader();
gltfLoader.setDRACOLoader(dracoLoader);

async function loadSceneModel(modelUrl) {
  if (!modelUrl) return;
  while (modelGroup.children.length > 0) {
    modelGroup.remove(modelGroup.children[0]);
  }
  try {
    const gltf = await gltfLoader.loadAsync(modelUrl);
    const model = gltf.scene;
    const box = new THREE.Box3().setFromObject(model);
    const size = box.getSize(new THREE.Vector3());
    const maxDim = Math.max(size.x, size.y, size.z);
    if (maxDim > 0) model.scale.setScalar(3 / maxDim);
    const center = box.getCenter(new THREE.Vector3());
    model.position.sub(center.multiplyScalar(model.scale.x));
    model.traverse(c => {
      if (c.isMesh) {
        c.castShadow = true;
        c.receiveShadow = true;
      }
    });
    modelGroup.add(model);
    showToast('场景已加载');
  } catch (e) {
    console.warn('模型加载失败:', e);
  }
}

function _rebuildWorld(config) {
  showToast(`正在切换到: ${config.name || config.terrain_type}...`);
  // 简单重载以获取新世界（物件会从 DB 恢复）
  setTimeout(() => location.reload(), 800);
}

// ── FPS 相机控制 ──────────────────────────────────────────

const keys = {};
const PI_2 = Math.PI / 2;
let yaw = 0, pitch = 0;
let velocity = new THREE.Vector3();
let isPointerLocked = false;
let isJumping = false;
let verticalVelocity = 0;

window.addEventListener('keydown', e => {
  // 聊天输入框激活时不处理移动/快捷键
  const chatting = document.activeElement?.id === 'chat-input';
  if (!chatting) {
    keys[e.code] = true;
  }
  if (e.code === 'KeyT' && isPointerLocked && !chatting) {
    e.preventDefault();
    chatUI.toggle();
  }
  if (e.code === 'KeyE' && isPointerLocked && !chatting) {
    const active = editor.toggle();
    showToast(active ? '编辑模式: 开 — 左键放置 右键删除' : '编辑模式: 关');
  }
  if (e.code === 'KeyG' && isPointerLocked && !chatting) {
    const grabbing = editor.grabToggle();
    showToast(grabbing ? '抓取模式: 开 — 左键拾取/放下 R旋转' : '抓取模式: 关');
  }
  if (e.code === 'KeyR' && isPointerLocked && !chatting) {
    if (editor.grabActive && editor.isGrabbing) {
      editor.rotateGrabbed();
      showToast('已旋转 45°');
    } else {
      const pos = camera.position.clone();
      const dir = new THREE.Vector3();
      camera.getWorldDirection(dir);
      pos.addScaledVector(dir, 2);
      pos.y = getSurfaceY() + 0.5;
      rollDiceAt(pos);
    }
  }
  if (e.code === 'KeyB' && isPointerLocked && !chatting) {
    if (document.getElementById('turn-indicator').style.display === 'none') {
      showTurnIndicator();
    } else {
      switchTurn();
    }
  }
  if (e.code === 'KeyC' && isPointerLocked && !chatting) {
    if (!chessUI.visible) {
      chessUI.startGame('white');
      showToast('国际象棋已开始！你执白方');
    } else {
      chessUI.hide();
    }
  }
  if (e.code === 'KeyK' && isPointerLocked && !chatting) {
    cardTableUI.toggle();
    if (cardTableUI.visible) {
      document.exitPointerLock();
      showToast('卡牌桌已打开 (K 关闭)');
    }
  }
  if (e.code === 'KeyV' && isPointerLocked && !chatting) {
    if (!voiceChat.isActive) {
      voiceChat.start((type, target, data) => {
        client.send({ type, target, data });
      }).then(ok => {
        if (ok) showToast('语音已连接 (V 切换静音)');
        else showToast('无法访问麦克风');
      });
    } else {
      const muted = voiceChat.toggleMute();
      showToast(muted ? '已静音' : '已取消静音');
    }
  }
  if (e.code === 'Escape' && isPointerLocked) {
    document.exitPointerLock();
  }
  // Enter 发送聊天
  if (e.code === 'Enter' && chatting) {
    const text = document.getElementById('chat-input')?.value?.trim();
    if (text) {
      // /gen 命令: AI 生成物件
      if (text.startsWith('/gen ')) {
        const prompt = text.slice(5).trim();
        if (prompt) {
          const result = generateFromPrompt(prompt);
          if (result && result.group) {
            const objId = 'ai_' + Date.now().toString(36) + '_' + Math.random().toString(36).slice(2, 6);
            const dir = new THREE.Vector3();
            camera.getWorldDirection(dir);
            result.group.position.copy(camera.position).addScaledVector(dir, 3);
            result.group.position.y = camera.position.y - 0.5;
            result.group.traverse(c => { if (c.isMesh) { c.castShadow = true; c.receiveShadow = true; } });
            scene.add(result.group);
            editor.placedObjects.set(objId, result.group);
            animatePlacement(result.group);
            client.send({ type: 'place_object', asset_key: 'ai:' + prompt, obj_id: objId, position: result.group.position.toArray(), rotation: result.group.quaternion.toArray() });
            chatUI.addMessage('系统', `🤖 已生成: ${prompt}`, true);
            showToast(`AI 已生成: ${prompt}`);
          }
        }
      } else {
        client.send({ type: 'chat_message', text });
        chatUI.addMessage(displayName, text);
      }
      document.getElementById('chat-input').value = '';
      chatUI.hide();
      renderer.domElement.requestPointerLock();
    }
  }
});
window.addEventListener('keyup', e => { keys[e.code] = false; });

renderer.domElement.addEventListener('click', () => {
  if (!isPointerLocked) renderer.domElement.requestPointerLock();
});

document.addEventListener('pointerlockchange', () => {
  isPointerLocked = document.pointerLockElement === renderer.domElement;
});

document.addEventListener('mousemove', (e) => {
  if (!isPointerLocked) return;
  yaw -= e.movementX * 0.002;
  pitch -= e.movementY * 0.002;
  pitch = Math.max(-PI_2, Math.min(PI_2, pitch));
});

function updateCamera(delta) {
  const speed = keys['ShiftLeft'] ? 8 : 4;
  const forward = new THREE.Vector3();
  camera.getWorldDirection(forward);
  forward.y = 0; forward.normalize();
  const right = new THREE.Vector3().crossVectors(forward, new THREE.Vector3(0, 1, 0)).normalize();

  velocity.set(0, 0, 0);
  if (keys['KeyW']) velocity.add(forward);
  if (keys['KeyS']) velocity.sub(forward);
  if (keys['KeyA']) velocity.sub(right);
  if (keys['KeyD']) velocity.add(right);

  velocity.normalize().multiplyScalar(speed * delta);
  camera.position.add(velocity);

  // 碰撞检测 — 根据当前世界动态计算
  const surfaceY = getSurfaceY() + 1.6; // 平台表面 + 眼高
  const dx = camera.position.x - ISLAND_CENTER.x;
  const dz = camera.position.z - ISLAND_CENTER.z;
  const onIsland = Math.sqrt(dx * dx + dz * dz) <= ISLAND_TOP_RADIUS;

  // 跳跃
  if (keys['Space'] && onIsland && Math.abs(verticalVelocity) < 0.01) {
    isJumping = true;
    verticalVelocity = 5;
  }
  verticalVelocity -= 15 * delta;
  camera.position.y += verticalVelocity * delta;

  if (onIsland && camera.position.y <= surfaceY) {
    camera.position.y = surfaceY;
    verticalVelocity = 0;
    isJumping = false;
  }

  // 掉下虚空 → 传送回岛面
  if (camera.position.y < ISLAND_CENTER.y - 20) {
    const teleportPos = new THREE.Vector3(ISLAND_CENTER.x, surfaceY, ISLAND_CENTER.z);
    spawnTeleportBurst(teleportPos);
    camera.position.copy(teleportPos);
    verticalVelocity = 0;
    isJumping = false;
    showToast('你掉入了虚空！已传送回');
  }

  // 旋转
  const euler = new THREE.Euler(pitch, yaw, 0, 'YXZ');
  camera.quaternion.setFromEuler(euler);
}

// ── 模块初始化 ────────────────────────────────────────────

const client = new MultiplayerClient();
const avatars = new AvatarSystem(scene);
const chatUI = new ChatUI();
const presence = new Presence();
const editor = new EditorMode(
  scene, camera, renderer,
  (assetKey, position, rotation, objId) => {
    client.send({ type: 'place_object', asset_key: assetKey, position, rotation, obj_id: objId });
  },
  (objId) => {
    client.send({ type: 'remove_object', obj_id: objId });
  },
  (objId, position, rotation) => {
    client.send({ type: 'move_object', obj_id: objId, position, rotation });
  }
);

chatUI.mount((text) => {
  client.send({ type: 'chat_message', text });
  chatUI.addMessage(displayName, text);
  setTimeout(() => {
    chatUI.hide();
    if (isPointerLocked) renderer.domElement.requestPointerLock();
  }, 100);
});
presence.mount((targetSid) => {
  client.send({ type: 'kick_user', target_session: targetSid });
  showToast('已踢出用户');
});

const chessUI = new ChessUI();
chessUI.mount((from, to, promotion) => {
  client.send({ type: 'chess_move', from, to, promotion });
});

const voiceChat = new VoiceChat();

const cardTableUI = new CardTableUI((action, data) => {
  client.send({ type: action, ...data });
});

// ── WebSocket 事件 ────────────────────────────────────────

client.on('room_state', (msg) => {
  roomId = msg.room_id;
  document.getElementById('conn-status').style.display = 'none';
  document.getElementById('join-sub').textContent = `房间 ${roomId}`;
  showToast(`已连接到房间 (${msg.users.length} 人在线)`);

  // 如果是房主，显示标记
  if (msg.is_host) {
    presence.setHost(true);
  }

  // 加载世界模板（如果和当前不同则重建）
  if (msg.world_config && msg.world_config.terrain_type !== 'floating_island') {
    _rebuildWorld(msg.world_config);
  }

  // 加载 GLB 场景
  if (msg.scene_id && msg.scene_id !== 'default') {
    fetch(`/api/scenes/${msg.scene_id}`)
      .then(r => r.json())
      .then(sceneData => {
        if (sceneData.model_url) loadSceneModel(sceneData.model_url);
      })
      .catch(() => {});
  }

  // 初始化玩家列表
  presence.setUsers(msg.users, msg.host_session);
  presence.setSelfSession(msg.session_id);
  avatars.selfSessionId = msg.session_id;
  voiceChat.setSelfId(msg.session_id);

  // 创建远程 Avatar
  for (const u of msg.users) {
    if (u.session_id !== msg.session_id) {
      avatars.addRemote(u.session_id, u.display_name, u.avatar_color, u.p, u.r);
    }
  }

  // 创建已有物件
  if (msg.objects) {
    for (const o of msg.objects) {
      editor.addRemoteObject(o.obj_id, o.asset_key, o.position, o.rotation);
    }
  }

  // 开始位置上报
  client.startPose(() => ({
    position: camera.position.toArray(),
    rotation: camera.quaternion.toArray(),
    animation: velocity.length() > 0.1 ? 'walk' : 'idle',
  }));
});

client.on('user_joined', (msg) => {
  avatars.addRemote(msg.session_id, msg.display_name, msg.avatar_color);
  presence.addUser(msg.session_id, msg.display_name, msg.avatar_color);
  chatUI.addMessage('系统', `${msg.display_name} 进入了世界`, true);
  showToast(`${msg.display_name} 加入了`);
  voiceChat.onUserJoined(msg.session_id);
});

client.on('user_left', (msg) => {
  avatars.removeRemote(msg.session_id);
  presence.removeUser(msg.session_id);
  chatUI.addMessage('系统', `${msg.display_name} 离开了`, true);
  voiceChat.onUserLeft(msg.session_id);
});

client.on('pose_broadcast', (msg) => {
  avatars.updateBatch(msg.users);
});

client.on('chat_broadcast', (msg) => {
  chatUI.addMessage(msg.display_name, msg.text);
});

client.on('object_placed', (msg) => {
  // 跳过本地已放置的物件（由自己的 placeSelected 创建）
  if (editor.placedObjects.has(msg.obj_id)) return;

  // AI 生成物件：远程重新生成
  if (msg.asset_key.startsWith('ai:')) {
    const prompt = msg.asset_key.slice(3);
    const result = generateFromPrompt(prompt);
    if (result && result.group) {
      result.group.position.set(msg.position[0], msg.position[1], msg.position[2]);
      result.group.quaternion.set(msg.rotation[0], msg.rotation[1], msg.rotation[2], msg.rotation[3]);
      result.group.traverse(c => { if (c.isMesh) { c.castShadow = true; c.receiveShadow = true; } });
      scene.add(result.group);
      editor.placedObjects.set(msg.obj_id, result.group);
      animatePlacement(result.group);
    }
    return;
  }
  editor.addRemoteObject(msg.obj_id, msg.asset_key, msg.position, msg.rotation);
  const obj = editor.placedObjects.get(msg.obj_id);
  if (obj) animatePlacement(obj);
});

client.on('object_removed', (msg) => {
  editor.removeRemoteObject(msg.obj_id);
});

client.on('object_moved', (msg) => {
  const obj = editor.placedObjects.get(msg.obj_id);
  if (obj) {
    obj.position.set(msg.position[0], msg.position[1], msg.position[2]);
    obj.quaternion.set(msg.rotation[0], msg.rotation[1], msg.rotation[2], msg.rotation[3]);
  }
});

client.on('disconnected', () => {

// ── 加入/重连逻辑 ──────────────────────────────────────────

function joinRoom() {
  if (!displayName) {
    displayName = document.getElementById('name-input')?.value?.trim() || 'Player';
  }
  localStorage.setItem('av_display_name', displayName);
  localStorage.setItem('av_avatar_color', avatarColor);

  document.getElementById('conn-status').style.display = 'block';

  // 如果没有 room ID，创建一个
  if (!roomId) {
    const template = params.get('template') || document.getElementById('template-select')?.value || 'floating_island';
    fetch('/api/rooms', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ scene_id: SCENE_ID || 'default', world_template: template }),
    })
      .then(r => r.json())
      .then(data => {
        roomId = data.room_id;
        history.replaceState(null, '', `?room=${roomId}`);
        client.connect(roomId, displayName, avatarColor);
      })
      .catch(err => {
        console.error('创建房间失败:', err);
        document.getElementById('conn-status').textContent = '服务器连接失败，请确认服务已启动';
      });
  } else {
    client.connect(roomId, displayName, avatarColor);
  }
}

  const nameInput = document.getElementById('name-input');

// ── 脚步声 (AudioContext) ──────────────────────────────────

const FootstepAudio = {
  _ctx: null,
  _lastStep: 0,
  _interval: 0.45,

  _ensureCtx() {
    if (!this._ctx) {
      this._ctx = new (window.AudioContext || window.webkitAudioContext)();
    }
    return this._ctx;
  },

  step() {
    const now = performance.now() / 1000;
    if (now - this._lastStep < this._interval) return;
    this._lastStep = now;

    const ctx = this._ensureCtx();
    if (ctx.state === 'suspended') ctx.resume();

    const dur = 0.07;
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    const filter = ctx.createBiquadFilter();

    osc.type = 'triangle';
    osc.frequency.setValueAtTime(180 + Math.random() * 40, ctx.currentTime);
    osc.frequency.exponentialRampToValueAtTime(30, ctx.currentTime + dur);

    filter.type = 'lowpass';
    filter.frequency.setValueAtTime(500, ctx.currentTime);

    gain.gain.setValueAtTime(0.04, ctx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + dur);

    osc.connect(filter);
    filter.connect(gain);
    gain.connect(ctx.destination);

    osc.start(ctx.currentTime);
    osc.stop(ctx.currentTime + dur);
  },
};

// ── 传送粒子爆发 ──────────────────────────────────────────

function spawnTeleportBurst(pos) {
  const count = 50;
  const geom = new THREE.BufferGeometry();
  const positions = new Float32Array(count * 3);
  const velocities = [];

  for (let i = 0; i < count; i++) {
    positions[i * 3] = pos.x;
    positions[i * 3 + 1] = pos.y;
    positions[i * 3 + 2] = pos.z;
    velocities.push({
      x: (Math.random() - 0.5) * 3,
      y: Math.random() * 4 + 1,
      z: (Math.random() - 0.5) * 3,
    });
  }

  geom.setAttribute('position', new THREE.BufferAttribute(positions, 3));
  const mat = new THREE.PointsMaterial({
    color: 0x7c3aed, size: 0.15, transparent: true,
    opacity: 1, depthWrite: false, blending: THREE.AdditiveBlending,
  });
  const points = new THREE.Points(geom, mat);
  scene.add(points);

  const start = performance.now();
  function tick() {
    const elapsed = (performance.now() - start) / 1000;
    if (elapsed > 1.2) {
      scene.remove(points); geom.dispose(); mat.dispose();
      return;
    }
    const arr = geom.attributes.position.array;
    for (let i = 0; i < count; i++) {
      arr[i * 3] += velocities[i].x * 0.016;
      arr[i * 3 + 1] += velocities[i].y * 0.016;
      arr[i * 3 + 2] += velocities[i].z * 0.016;
      velocities[i].y -= 4 * 0.016;
    }
    geom.attributes.position.needsUpdate = true;
    mat.opacity = 1 - elapsed / 1.2;
    requestAnimationFrame(tick);
  }
  tick();
}

// ── 放置反馈动画 ──────────────────────────────────────────

function animatePlacement(mesh) {
  const start = performance.now();
  const origScale = mesh.scale.clone();
  mesh.scale.set(0.01, 0.01, 0.01);

  function tick() {
    const elapsed = (performance.now() - start) / 1000;
    if (elapsed > 0.3) {
      mesh.scale.copy(origScale);
      return;
    }
    const t = elapsed / 0.3;
    const s = 1 - Math.pow(1 - t, 3);
    const bounce = 1 + Math.sin(t * Math.PI * 2) * 0.15 * (1 - t);
    const scale = s * bounce;
    mesh.scale.setScalar(Math.max(0.01, scale));
    requestAnimationFrame(tick);
  }
  tick();
}

// ── 骰子投掷 ──────────────────────────────────────────────

let _diceObjects = [];

function rollDiceAt(position) {
  const count = 2;
  const results = [];
  for (let i = 0; i < count; i++) {
    const geom = new THREE.BoxGeometry(0.15, 0.15, 0.15);
    const mats = Array(6).fill(null).map(() =>
      new THREE.MeshStandardMaterial({ color: 0xffffff, roughness: 0.4 })
    );
    _paintDiceFaces(mats);

    const dice = new THREE.Mesh(geom, mats);
    dice.position.copy(position);
    dice.position.x += (i - 0.5) * 0.3;
    dice.position.y += 1.5 + Math.random() * 0.5;
    dice.castShadow = true;

    dice.userData.vel = new THREE.Vector3(
      (Math.random() - 0.5) * 2,
      3 + Math.random() * 3,
      (Math.random() - 0.5) * 2
    );
    dice.userData.angVel = new THREE.Vector3(
      Math.random() * 15, Math.random() * 15, Math.random() * 15
    );
    dice.userData.result = null;

    scene.add(dice);
    _diceObjects.push(dice);
    results.push(dice);
  }

  setTimeout(() => {
    for (const d of results) {
      const up = new THREE.Vector3(0, 1, 0);
      up.applyQuaternion(d.quaternion);
      const face = _closestFace(up);
      d.userData.result = face;
      _snapToFace(d, face);
    }
    const vals = results.map(d => d.userData.result + 1);
    showToast(`🎲 骰子: ${vals.join(' + ')} = ${vals.reduce((a, b) => a + b, 0)}`);
  }, 3000);

  return results;
}

function _paintDiceFaces(mats) {
  const dots = [
    [4], [0, 8], [0, 4, 8], [0, 2, 6, 8],
    [0, 2, 4, 6, 8], [0, 2, 3, 5, 6, 8],
  ];
  for (let face = 0; face < 6; face++) {
    const canvas = document.createElement('canvas');
    canvas.width = 64; canvas.height = 64;
    const ctx = canvas.getContext('2d');
    ctx.fillStyle = '#ffffff';
    ctx.fillRect(0, 0, 64, 64);
    ctx.fillStyle = '#111111';
    for (const pos of dots[face]) {
      const col = pos % 3;
      const row = Math.floor(pos / 3);
      ctx.beginPath();
      ctx.arc(16 + col * 16, 16 + row * 16, 5, 0, Math.PI * 2);
      ctx.fill();
    }
    const tex = new THREE.CanvasTexture(canvas);
    tex.needsUpdate = true;
    mats[face].map = tex;
    mats[face].needsUpdate = true;
  }
}

function _closestFace(normal) {
  const dirs = [
    new THREE.Vector3(0, 1, 0), new THREE.Vector3(0, 0, 1),
    new THREE.Vector3(1, 0, 0), new THREE.Vector3(-1, 0, 0),
    new THREE.Vector3(0, 0, -1), new THREE.Vector3(0, -1, 0),
  ];
  let best = 0, bestDot = -Infinity;
  for (let i = 0; i < 6; i++) {
    const d = normal.dot(dirs[i]);
    if (d > bestDot) { bestDot = d; best = i; }
  }
  return best;
}

function _snapToFace(dice, face) {
  const dirs = [
    new THREE.Vector3(0, 1, 0), new THREE.Vector3(0, 0, 1),
    new THREE.Vector3(1, 0, 0), new THREE.Vector3(-1, 0, 0),
    new THREE.Vector3(0, 0, -1), new THREE.Vector3(0, -1, 0),
  ];
  const q = new THREE.Quaternion().setFromUnitVectors(
    new THREE.Vector3(0, 1, 0), dirs[face]
  );
  dice.quaternion.copy(q);
}

// ── 回合指示器 ─────────────────────────────────────────────

let _currentTurn = 0;
const _turnColors = ['#f0f0e0', '#2a2a2a'];
const _turnNames = ['白方', '黑方'];

function updateTurnUI() {

// ── 渲染循环 ──────────────────────────────────────────────

const clock = new THREE.Clock();
let lastFrameTime = performance.now();

function animate() {
  requestAnimationFrame(animate);

  const delta = Math.min(clock.getDelta(), 0.1);
  const now = performance.now();
  const frameDelta = (now - lastFrameTime) / 1000;
  lastFrameTime = now;

  updateCamera(delta);
  avatars.tick(camera, Math.max(frameDelta, 0.016));
  if (editor.active) editor.tick();

  // 脚步声：移动且在地面时
  {
    const dx2 = camera.position.x - ISLAND_CENTER.x;
    const dz2 = camera.position.z - ISLAND_CENTER.z;
    const onIsland2 = Math.sqrt(dx2 * dx2 + dz2 * dz2) <= ISLAND_TOP_RADIUS;
    const onGround = Math.abs(camera.position.y - (getSurfaceY() + 1.6)) < 0.15;
    if (velocity.length() > 0.1 && onIsland2 && onGround) {
      FootstepAudio.step();
    }
  }

  // 骰子物理
  for (const dice of _diceObjects) {
    if (!dice.userData.vel) continue;
    dice.userData.vel.y -= 9.8 * delta;
    dice.position.x += dice.userData.vel.x * delta;
    dice.position.y += dice.userData.vel.y * delta;
    dice.position.z += dice.userData.vel.z * delta;
    dice.rotation.x += dice.userData.angVel.x * delta;
    dice.rotation.y += dice.userData.angVel.y * delta;
    dice.rotation.z += dice.userData.angVel.z * delta;

    const surfaceY = getSurfaceY() + 0.075;
    if (dice.position.y <= surfaceY) {
      dice.position.y = surfaceY;
      if (dice.userData.vel.y < -0.5) {
        dice.userData.vel.y *= -0.3;
        dice.userData.angVel.multiplyScalar(0.5);
      } else {
        dice.userData.vel.set(0, 0, 0);
        dice.userData.angVel.multiplyScalar(0.9);
      }
    }
  }

  renderer.render(scene, camera);
}
animate();
