<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AnchorVerse — Multiplayer World</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #0a0a14; overflow: hidden; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }

  /* 加入界面 */
  #join-overlay {
    position: fixed; inset: 0; display: flex; align-items: center; justify-content: center;
    background: rgba(10,10,20,0.95); z-index: 200;
  }
  #join-card {
    background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1);
    border-radius: 16px; padding: 40px 32px; max-width: 400px; width: 90vw; text-align: center;
  }
  #join-card h2 { color: #fff; font-size: 24px; margin-bottom: 8px; }
  #join-card h2 span { color: #7c3aed; }
  #join-card .subtitle { color: #888; font-size: 14px; margin-bottom: 24px; }
  #join-card label { display: block; color: #999; font-size: 12px; text-align: left; margin-bottom: 4px; }
  #join-card input {
    width: 100%; padding: 10px 14px; border-radius: 8px;
    border: 1px solid rgba(255,255,255,0.1); background: rgba(0,0,0,0.4);
    color: #fff; font-size: 14px; margin-bottom: 14px; outline: none;
  }
  #join-card input:focus { border-color: #7c3aed; }
  .color-row { display: flex; gap: 8px; margin-bottom: 14px; }
  .color-dot { width: 28px; height: 28px; border-radius: 50%; cursor: pointer; border: 2px solid transparent; transition: border-color 0.1s; }
  .color-dot:hover { border-color: #fff; }
  .color-dot.selected { border-color: #fff; }
  #join-btn {
    width: 100%; padding: 12px; border-radius: 8px; border: none;
    background: #7c3aed; color: #fff; font-size: 15px; font-weight: 600; cursor: pointer;
    margin-top: 8px; transition: background 0.15s;
  }
  #join-btn:hover { background: #6d28d9; }
  #join-btn:disabled { background: #444; cursor: default; }

  /* HUD */
  #hud {
    position: fixed; bottom: 16px; left: 50%; transform: translateX(-50%);
    color: rgba(255,255,255,0.5); font-size: 12px; z-index: 50;
    pointer-events: none; text-align: center;
  }
  #hud .key { color: #7c3aed; }

  /* 连接状态 */
  #conn-status {
    position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
    color: #fff; font-size: 18px; z-index: 150; display: none;
  }

  /* 系统消息 toast */
  .toast {
    position: fixed; top: 80px; left: 50%; transform: translateX(-50%);
    color: #ccc; font-size: 13px; z-index: 110; pointer-events: none;
    background: rgba(0,0,0,0.6); padding: 6px 16px; border-radius: 20px;
    animation: toastIn 0.3s ease, toastOut 0.3s ease 4s forwards;
  }
  @keyframes toastIn { from { opacity: 0; transform: translateX(-50%) translateY(-10px); } to { opacity: 1; transform: translateX(-50%) translateY(0); } }
  @keyframes toastOut { from { opacity: 1; } to { opacity: 0; } }
</style>
</head>
<body>

<!-- 加入界面 -->
<div id="join-overlay">
  <div id="join-card">
    <h2><span>Anchor</span>Verse</h2>
    <p class="subtitle" id="join-sub">加入多人世界</p>
    <label>显示名称</label>
    <input id="name-input" placeholder="输入你的名字..." maxlength="20" value="Player">
    <label>选择颜色</label>
    <div class="color-row" id="color-picker"></div>
    <button id="join-btn">进入世界</button>
  </div>
</div>

<!-- HUD -->
<div id="hud">
  <span class="key">WASD</span> 移动 &nbsp;
  <span class="key">鼠标</span> 视角 &nbsp;
  <span class="key">Space</span> 跳跃 &nbsp;
  <span class="key">T</span> 聊天 &nbsp;
  <span class="key">E</span> 编辑 &nbsp;
  <span class="key">左键</span> 放置 &nbsp;
  <span class="key">右键</span> 删除
</div>

<div id="conn-status">正在连接...</div>

<!-- Three.js + Addons -->
<script type="importmap">
{
  "imports": {
    "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
    "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
  }
}
</script>

<script type="module">
import * as THREE from 'three';
import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
import { DRACOLoader } from 'three/addons/loaders/DRACOLoader.js';
import { MultiplayerClient } from '../js/websocket-client.js';
import { AvatarSystem } from '../js/avatar-system.js';
import { ChatUI } from '../js/chat-ui.js';
import { Presence } from '../js/presence.js';
import { EditorMode } from '../js/editor-mode.js';

// ── 全局状态 ──────────────────────────────────────────────
const params = new URLSearchParams(location.search);
const ROOM_ID = params.get('room');
const SCENE_ID = params.get('scene');

let roomId = ROOM_ID;
let displayName = 'Player';
let avatarColor = '#6366f1';

// ── Three.js 初始化 ───────────────────────────────────────

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.shadowMap.enabled = true;
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.2;
document.body.appendChild(renderer.domElement);

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x87ceeb);  // 天蓝色
scene.fog = new THREE.Fog(0xc8dce8, 30, 80);    // 远处淡雾

// 岛屿参数（必须在 camera 之前定义）
const ISLAND_CENTER = new THREE.Vector3(0, 6, 0);

const camera = new THREE.PerspectiveCamera(70, window.innerWidth / window.innerHeight, 0.1, 150);
camera.position.set(0, ISLAND_CENTER.y + 1.6, 8);

// 光照 — 日光感
scene.add(new THREE.AmbientLight(0x8899bb, 2));
const sunLight = new THREE.DirectionalLight(0xffeedd, 4);
sunLight.position.set(20, 25, 10);
sunLight.castShadow = true;
scene.add(sunLight);
const skyLight = new THREE.DirectionalLight(0xaaccff, 1.5);
skyLight.position.set(-10, 15, -5);
scene.add(skyLight);
const ISLAND_TOP_RADIUS = 4.5;
const ISLAND_HEIGHT = 10;
const ISLAND_BOTTOM_RADIUS = 0.3;

const islandGroup = new THREE.Group();
scene.add(islandGroup);

// 锥体主体 — 上大下小的倒锥
const coneGeom = new THREE.CylinderGeometry(ISLAND_BOTTOM_RADIUS, ISLAND_TOP_RADIUS, ISLAND_HEIGHT, 32);
const coneMat = new THREE.MeshStandardMaterial({ color: 0x6b5e4a, roughness: 0.8, metalness: 0.05 });
const cone = new THREE.Mesh(coneGeom, coneMat);
cone.position.copy(ISLAND_CENTER);
cone.position.y -= ISLAND_HEIGHT / 2;
cone.castShadow = true;
cone.receiveShadow = true;
islandGroup.add(cone);

// 顶部平台 — 草皮表面
const topGeom = new THREE.CylinderGeometry(ISLAND_TOP_RADIUS, ISLAND_TOP_RADIUS, 0.3, 32);
const topMat = new THREE.MeshStandardMaterial({ color: 0x4a7c3f, roughness: 0.7 });
const topDisk = new THREE.Mesh(topGeom, topMat);
topDisk.position.copy(ISLAND_CENTER);
topDisk.position.y += 0.15;
topDisk.castShadow = true;
topDisk.receiveShadow = true;
islandGroup.add(topDisk);

// 顶部草地环 — 轻微凸起的边缘
const rimGeom = new THREE.TorusGeometry(ISLAND_TOP_RADIUS - 0.15, 0.25, 8, 32);
const rimMat = new THREE.MeshStandardMaterial({ color: 0x5a9645, roughness: 0.6 });
const rim = new THREE.Mesh(rimGeom, rimMat);
rim.rotation.x = Math.PI / 2;
rim.position.copy(ISLAND_CENTER);
rim.position.y += 0.3;
rim.castShadow = true;
islandGroup.add(rim);

// 岩层纹理 — 锥体上几圈突出的岩石环
for (let i = 1; i <= 3; i++) {
  const t = i / 4;
  const rockY = ISLAND_CENTER.y - ISLAND_HEIGHT * t;
  const rockRadius = ISLAND_BOTTOM_RADIUS + (ISLAND_TOP_RADIUS - ISLAND_BOTTOM_RADIUS) * (1 - t);
  const rockGeom = new THREE.TorusGeometry(rockRadius, 0.15 + Math.random() * 0.2, 8, 32);
  const rockMat = new THREE.MeshStandardMaterial({ color: 0x8a7a6a, roughness: 0.9 });
  const rockRing = new THREE.Mesh(rockGeom, rockMat);
  rockRing.rotation.x = Math.PI / 2;
  rockRing.position.y = rockY;
  rockRing.castShadow = true;
  islandGroup.add(rockRing);
}

// 底部尖刺水晶
const crystalGeom = new THREE.OctahedronGeometry(0.5, 0);
const crystalMat = new THREE.MeshStandardMaterial({
  color: 0x7c3aed,
  roughness: 0.2,
  metalness: 0.3,
  emissive: 0x2a1050,
  emissiveIntensity: 0.8,
});
const crystal = new THREE.Mesh(crystalGeom, crystalMat);
crystal.position.copy(ISLAND_CENTER);
crystal.position.y -= ISLAND_HEIGHT + 0.3;
crystal.scale.set(1, 1.8, 1);
islandGroup.add(crystal);

// 水晶光点
const glowGeom = new THREE.SphereGeometry(0.15, 8, 8);
const glowMat = new THREE.MeshBasicMaterial({ color: 0x7c3aed });
const glow = new THREE.Mesh(glowGeom, glowMat);
glow.position.copy(crystal.position);
glow.position.y -= 0.4;
islandGroup.add(glow);

// 浮空碎石 — 环绕岛屿的小石头
for (let i = 0; i < 12; i++) {
  const angle = (i / 12) * Math.PI * 2;
  const dist = ISLAND_TOP_RADIUS + 1.5 + Math.random() * 2.5;
  const heightOff = (Math.random() - 0.5) * 3;
  const rockGeom = new THREE.IcosahedronGeometry(0.2 + Math.random() * 0.5, 1);
  const rockMat = new THREE.MeshStandardMaterial({ color: 0x888888, roughness: 0.9 });
  const smallRock = new THREE.Mesh(rockGeom, rockMat);
  smallRock.position.set(
    ISLAND_CENTER.x + Math.cos(angle) * dist,
    ISLAND_CENTER.y + heightOff,
    ISLAND_CENTER.z + Math.sin(angle) * dist
  );
  smallRock.rotation.set(Math.random() * Math.PI, Math.random() * Math.PI, 0);
  smallRock.castShadow = true;
  islandGroup.add(smallRock);
}

// 云朵
function makeCloud(x, y, z, scale = 1) {
  const cloudGroup = new THREE.Group();
  const cloudMat = new THREE.MeshStandardMaterial({ color: 0xffffff, roughness: 1, transparent: true, opacity: 0.6 });
  for (let j = 0; j < 5; j++) {
    const blobGeom = new THREE.SphereGeometry((0.4 + Math.random() * 0.6) * scale, 8, 6);
    const blob = new THREE.Mesh(blobGeom, cloudMat);
    blob.position.set(Math.random() * 1.5 * scale, Math.random() * 0.4 * scale, Math.random() * 1.5 * scale);
    cloudGroup.add(blob);
  }
  cloudGroup.position.set(x, y, z);
  return cloudGroup;
}

// 岛屿上方和周围的云
for (let i = 0; i < 8; i++) {
  const angle = Math.random() * Math.PI * 2;
  const dist = ISLAND_TOP_RADIUS + 2 + Math.random() * 6;
  const cloudY = ISLAND_CENTER.y + 2 + Math.random() * 4;
  const cloud = makeCloud(
    ISLAND_CENTER.x + Math.cos(angle) * dist,
    cloudY,
    ISLAND_CENTER.z + Math.sin(angle) * dist,
    0.8 + Math.random() * 1.5
  );
  islandGroup.add(cloud);
}

// 远处环状粒子 — 增加空间感
const particlesGeom = new THREE.BufferGeometry();
const particlesCount = 200;
const positions = new Float32Array(particlesCount * 3);
for (let i = 0; i < particlesCount; i++) {
  const angle = Math.random() * Math.PI * 2;
  const dist = ISLAND_TOP_RADIUS + 3 + Math.random() * 15;
  positions[i * 3] = ISLAND_CENTER.x + Math.cos(angle) * dist;
  positions[i * 3 + 1] = ISLAND_CENTER.y + (Math.random() - 0.3) * 20;
  positions[i * 3 + 2] = ISLAND_CENTER.z + Math.sin(angle) * dist;
}
particlesGeom.setAttribute('position', new THREE.BufferAttribute(positions, 3));
const particlesMat = new THREE.PointsMaterial({
  color: 0xaaaacc,
  size: 0.08,
  transparent: true,
  opacity: 0.5,
  depthWrite: false,
});
const particles = new THREE.Points(particlesGeom, particlesMat);
scene.add(particles);

// 更新相机出生点 — 站在岛屿表面上
camera.position.set(0, ISLAND_CENTER.y + 1.6, 5);

// 更新跳跃地面高度
const GROUND_Y = ISLAND_CENTER.y;

// 模型组 — GLB 加载的模型也放到岛屿上
const modelGroup = new THREE.Group();
modelGroup.position.copy(ISLAND_CENTER);
scene.add(modelGroup);

// 移除旧网格引用（保持 scene 干净）
// grid 不再添加 — 浮空岛不需要网格


// ── GLB 加载器 ────────────────────────────────────────────

const dracoLoader = new DRACOLoader();
dracoLoader.setDecoderPath('https://unpkg.com/three@0.160.0/examples/jsm/libs/draco/');
const gltfLoader = new GLTFLoader();
gltfLoader.setDRACOLoader(dracoLoader);

async function loadSceneModel(modelUrl) {
  if (!modelUrl) return;
  // 清除旧模型
  while (modelGroup.children.length > 0) {
    const child = modelGroup.children[0];
    modelGroup.remove(child);
  }
  try {
    const gltf = await gltfLoader.loadAsync(modelUrl);
    const model = gltf.scene;
    // 缩放适配
    const box = new THREE.Box3().setFromObject(model);
    const size = box.getSize(new THREE.Vector3());
    const maxDim = Math.max(size.x, size.y, size.z);
    if (maxDim > 0) model.scale.setScalar(3 / maxDim);
    const center = box.getCenter(new THREE.Vector3());
    model.position.sub(center.multiplyScalar(model.scale.x));
    model.traverse(c => {
      if (c.isMesh) {
        c.castShadow = true;
        c.receiveShadow = true;
      }
    });
    modelGroup.add(model);
    showToast('场景已加载');
  } catch (e) {
    console.warn('模型加载失败:', e);
  }
}

// ── FPS 相机控制 ──────────────────────────────────────────

const keys = {};
const PI_2 = Math.PI / 2;
let yaw = 0, pitch = 0;
let velocity = new THREE.Vector3();
let isPointerLocked = false;
let isJumping = false;
let verticalVelocity = 0;

window.addEventListener('keydown', e => {
  // 聊天输入框激活时不处理移动/快捷键
  const chatting = document.activeElement?.id === 'chat-input';
  if (!chatting) {
    keys[e.code] = true;
  }
  if (e.code === 'KeyT' && isPointerLocked && !chatting) {
    e.preventDefault();
    chatUI.toggle();
  }
  if (e.code === 'KeyE' && isPointerLocked && !chatting) {
    const active = editor.toggle();
    showToast(active ? '编辑模式: 开 — 左键放置 右键删除' : '编辑模式: 关');
  }
  if (e.code === 'Escape' && isPointerLocked) {
    document.exitPointerLock();
  }
  // Enter 发送聊天
  if (e.code === 'Enter' && chatting) {
    const text = document.getElementById('chat-input')?.value?.trim();
    if (text) {
      client.send({ type: 'chat_message', text });
      chatUI.addMessage(displayName, text);
      document.getElementById('chat-input').value = '';
      chatUI.hide();
      renderer.domElement.requestPointerLock();
    }
  }
});
window.addEventListener('keyup', e => { keys[e.code] = false; });

renderer.domElement.addEventListener('click', () => {
  if (!isPointerLocked) renderer.domElement.requestPointerLock();
});

document.addEventListener('pointerlockchange', () => {
  isPointerLocked = document.pointerLockElement === renderer.domElement;
});

document.addEventListener('mousemove', (e) => {
  if (!isPointerLocked) return;
  yaw -= e.movementX * 0.002;
  pitch -= e.movementY * 0.002;
  pitch = Math.max(-PI_2, Math.min(PI_2, pitch));
});

function updateCamera(delta) {
  const speed = keys['ShiftLeft'] ? 8 : 4;
  const forward = new THREE.Vector3();
  camera.getWorldDirection(forward);
  forward.y = 0; forward.normalize();
  const right = new THREE.Vector3().crossVectors(forward, new THREE.Vector3(0, 1, 0)).normalize();

  velocity.set(0, 0, 0);
  if (keys['KeyW']) velocity.add(forward);
  if (keys['KeyS']) velocity.sub(forward);
  if (keys['KeyA']) velocity.sub(right);
  if (keys['KeyD']) velocity.add(right);

  velocity.normalize().multiplyScalar(speed * delta);
  camera.position.add(velocity);

  // 岛屿表面检测 — 站在距离岛中心 ISLAND_TOP_RADIUS 内才算着地
  const dx = camera.position.x - ISLAND_CENTER.x;
  const dz = camera.position.z - ISLAND_CENTER.z;
  const onIsland = Math.sqrt(dx * dx + dz * dz) <= ISLAND_TOP_RADIUS;
  const surfaceY = ISLAND_CENTER.y + 0.3 + 1.6; // 平台表面 + 眼高

  // 跳跃
  if (keys['Space'] && onIsland && Math.abs(verticalVelocity) < 0.01) {
    isJumping = true;
    verticalVelocity = 5;
  }
  verticalVelocity -= 15 * delta;
  camera.position.y += verticalVelocity * delta;

  if (onIsland && camera.position.y <= surfaceY) {
    camera.position.y = surfaceY;
    verticalVelocity = 0;
    isJumping = false;
  }

  // 掉下虚空 → 传送回岛面
  if (camera.position.y < ISLAND_CENTER.y - 20) {
    camera.position.set(ISLAND_CENTER.x, surfaceY, ISLAND_CENTER.z);
    verticalVelocity = 0;
    isJumping = false;
    showToast('你掉入了虚空！已传送回浮空岛');
  }

  // 旋转
  const euler = new THREE.Euler(pitch, yaw, 0, 'YXZ');
  camera.quaternion.setFromEuler(euler);
}

// ── 模块初始化 ────────────────────────────────────────────

const client = new MultiplayerClient();
const avatars = new AvatarSystem(scene);
const chatUI = new ChatUI();
const presence = new Presence();
const editor = new EditorMode(
  scene, camera, renderer,
  (assetKey, position, rotation) => {
    client.send({ type: 'place_object', asset_key: assetKey, position, rotation });
  },
  (objId) => {
    client.send({ type: 'remove_object', obj_id: objId });
  }
);

chatUI.mount((text) => {
  client.send({ type: 'chat_message', text });
  chatUI.addMessage(displayName, text);
  // 发送后自动关闭聊天，返回游戏
  setTimeout(() => {
    chatUI.hide();
    if (isPointerLocked) renderer.domElement.requestPointerLock();
  }, 100);
});
presence.mount();

// ── WebSocket 事件 ────────────────────────────────────────

client.on('room_state', (msg) => {
  roomId = msg.room_id;
  document.getElementById('conn-status').style.display = 'none';
  document.getElementById('join-sub').textContent = `房间 ${roomId}`;
  showToast(`已连接到房间 (${msg.users.length} 人在线)`);

  // 加载场景
  if (msg.scene_id && msg.scene_id !== 'default') {
    fetch(`/api/scenes/${msg.scene_id}`)
      .then(r => r.json())
      .then(sceneData => {
        if (sceneData.model_url) loadSceneModel(sceneData.model_url);
      })
      .catch(() => {});
  }

  // 初始化玩家列表
  presence.setUsers(msg.users);
  avatars.selfSessionId = msg.session_id;

  // 创建远程 Avatar
  for (const u of msg.users) {
    if (u.session_id !== msg.session_id) {
      avatars.addRemote(u.session_id, u.display_name, u.avatar_color, u.p, u.r);
    }
  }

  // 创建已有物件
  if (msg.objects) {
    for (const o of msg.objects) {
      editor.addRemoteObject(o.obj_id, o.asset_key, o.position, o.rotation);
    }
  }

  // 开始位置上报
  client.startPose(() => ({
    position: camera.position.toArray(),
    rotation: camera.quaternion.toArray(),
    animation: velocity.length() > 0.1 ? 'walk' : 'idle',
  }));
});

client.on('user_joined', (msg) => {
  avatars.addRemote(msg.session_id, msg.display_name, msg.avatar_color);
  presence.addUser(msg.session_id, msg.display_name, msg.avatar_color);
  chatUI.addMessage('系统', `${msg.display_name} 进入了世界`, true);
  showToast(`${msg.display_name} 加入了`);
});

client.on('user_left', (msg) => {
  avatars.removeRemote(msg.session_id);
  presence.removeUser(msg.session_id);
  chatUI.addMessage('系统', `${msg.display_name} 离开了`, true);
});

client.on('pose_broadcast', (msg) => {
  avatars.updateBatch(msg.users);
});

client.on('chat_broadcast', (msg) => {
  chatUI.addMessage(msg.display_name, msg.text);
});

client.on('object_placed', (msg) => {
  editor.addRemoteObject(msg.obj_id, msg.asset_key, msg.position, msg.rotation);
});

client.on('object_removed', (msg) => {
  editor.removeRemoteObject(msg.obj_id);
});

client.on('object_moved', (msg) => {
  const obj = editor.placedObjects.get(msg.obj_id);
  if (obj) {
    obj.position.set(msg.position[0], msg.position[1], msg.position[2]);
    obj.quaternion.set(msg.rotation[0], msg.rotation[1], msg.rotation[2], msg.rotation[3]);
  }
});

client.on('disconnected', () => {
  showToast('连接断开，正在重连...');
});

client.on('error', (msg) => {
  if (msg.text === '房间不存在') {
    // 服务器重启后房间已销毁，自动创建新房间
    roomId = null;
    history.replaceState(null, '', location.pathname);
    showToast('房间已过期，正在创建新房间...');
    joinRoom();
  }
});

client.on('emote_broadcast', (msg) => {
  // TODO: 播放表情动画
});

// ── 加入流程 ──────────────────────────────────────────────

const AVATAR_COLORS = ['#6366f1', '#ec4899', '#f59e0b', '#10b981', '#3b82f6', '#8b5cf6', '#ef4444', '#06b6d4'];

function initColorPicker() {
  const row = document.getElementById('color-picker');
  AVATAR_COLORS.forEach((c, i) => {
    const dot = document.createElement('span');
    dot.className = 'color-dot' + (i === 0 ? ' selected' : '');
    dot.style.background = c;
    dot.addEventListener('click', () => {
      row.querySelectorAll('.color-dot').forEach(d => d.classList.remove('selected'));
      dot.classList.add('selected');
      avatarColor = c;
    });
    row.appendChild(dot);
  });
  avatarColor = AVATAR_COLORS[0];
}

initColorPicker();

// 从 localStorage 恢复
const savedName = localStorage.getItem('av_display_name');
if (savedName) {
  document.getElementById('name-input').value = savedName;
  displayName = savedName;
}
const savedColor = localStorage.getItem('av_avatar_color');
if (savedColor) {
  avatarColor = savedColor;
  document.querySelectorAll('.color-dot').forEach(d => d.classList.remove('selected'));
  const idx = AVATAR_COLORS.indexOf(savedColor);
  if (idx >= 0) document.querySelectorAll('.color-dot')[idx].classList.add('selected');
}

// ── 加入/重连逻辑 ──────────────────────────────────────────

function joinRoom() {
  if (!displayName) {
    displayName = document.getElementById('name-input')?.value?.trim() || 'Player';
  }
  localStorage.setItem('av_display_name', displayName);
  localStorage.setItem('av_avatar_color', avatarColor);

  document.getElementById('conn-status').style.display = 'block';

  // 如果没有 room ID，创建一个
  if (!roomId) {
    fetch('/api/rooms', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ scene_id: SCENE_ID || 'default' }),
    })
      .then(r => r.json())
      .then(data => {
        roomId = data.room_id;
        history.replaceState(null, '', `?room=${roomId}`);
        client.connect(roomId, displayName, avatarColor);
      })
      .catch(err => {
        console.error('创建房间失败:', err);
        document.getElementById('conn-status').textContent = '服务器连接失败，请确认服务已启动';
      });
  } else {
    client.connect(roomId, displayName, avatarColor);
  }
}

document.getElementById('join-btn').addEventListener('click', () => {
  const nameInput = document.getElementById('name-input');
  displayName = nameInput.value.trim() || 'Player';
  document.getElementById('join-overlay').style.display = 'none';
  joinRoom();
  renderer.domElement.requestPointerLock();
});

// ── 点击交互 ──────────────────────────────────────────────

renderer.domElement.addEventListener('mousedown', (e) => {
  if (!isPointerLocked || !editor.active) return;

  if (e.button === 0) {
    // 左键：放置物件
    editor.placeSelected();
  } else if (e.button === 2) {
    // 右键：删除物件
    editor.removePointed();
  }
});

renderer.domElement.addEventListener('contextmenu', e => e.preventDefault());

// ── Toast ─────────────────────────────────────────────────

function showToast(text) {
  const el = document.createElement('div');
  el.className = 'toast';
  el.textContent = text;
  document.body.appendChild(el);
  setTimeout(() => el.remove(), 4500);
}

// ── 渲染循环 ──────────────────────────────────────────────

const clock = new THREE.Clock();
let lastFrameTime = performance.now();

function animate() {
  requestAnimationFrame(animate);

  const delta = Math.min(clock.getDelta(), 0.1);
  const now = performance.now();
  const frameDelta = (now - lastFrameTime) / 1000;
  lastFrameTime = now;

  updateCamera(delta);
  avatars.tick(camera, Math.max(frameDelta, 0.016));
  if (editor.active) editor.tick();

  renderer.render(scene, camera);
}
animate();

// ── 窗口大小 ──────────────────────────────────────────────

window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});

// ── 离开时清理 ────────────────────────────────────────────

window.addEventListener('beforeunload', () => {
  client.disconnect();
});

console.log('🏗️  AnchorVerse multiplayer world ready');
console.log(`   Room: ${roomId || '(auto-create)'}`);
console.log('   WASD=move  Mouse=look  T=chat  E=edit');
</script>
